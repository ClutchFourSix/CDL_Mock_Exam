        Q("What happens if a CDL holder is found to have any alcohol in their system while operating a CMV?", ["A) They are issued a warning", "B) They are placed out of service for 24 hours", "C) They are disqualified for 1 year", "D) They are arrested immediately"], "B", "Any CDL holder operating a CMV who is found to have any alcohol in their system is placed out of service for a minimum of 24 hours.", "Alcohol Rules", true),
        Q("What is the minimum disqualification period for a first-offense DUI in a CMV?", ["A) 30 days", "B) 60 days", "C) 1 year", "D) 3 years"], "C", "A first-offense DUI or refusal to submit to chemical testing results in a minimum 1-year CDL disqualification.", "Alcohol Rules", true),
        Q("What should you do with the ignition key during a pre-trip inspection?", ["A) Leave it in the ignition", "B) Put it in your pocket", "C) Place it on the seat", "D) Give it to the examiner"], "B", "The ignition key should be placed in your pocket during the pre-trip inspection so no one can move the vehicle while you are inspecting it.", "Vehicle Inspection", false),
        Q("How do you test hydraulic brakes for leaks?", ["A) Look under the vehicle for puddles", "B) Pump the brake pedal three times, hold for 5 seconds, and check for pedal movement", "C) Listen for hissing sounds", "D) Check the brake fluid reservoir"], "B", "To test hydraulic brakes for leaks, pump the brake pedal three times, then apply firm pressure and hold for five seconds. The pedal should not move. If it does, there may be a leak.", "Braking", false),
        Q("What should you check on leaf springs during a pre-trip inspection?", ["A) Missing or broken leaves", "B) Cracked hangers", "C) Tight U-bolts", "D) All of the above"], "D", "Check leaf springs for missing or broken leaves, cracked hangers, and tight U-bolts. If one-fourth or more of the leaves are missing, the vehicle should be placed out of service.", "Vehicle Inspection", false),
        Q("To avoid mechanical damage, it's important to:", ["A) Engage the parking brake once you take your foot off the brake", "B) Speed up in a smooth, gradual manner", "C) Provide plenty of power to the engine by accelerating quickly", "D) Roll slightly backwards before pressing the accelerator gradually"], "B", "If you accelerate in a rough or jerky manner, it can cause mechanical damage. For this reason, it's important to speed up in a smooth, gradual way.", "Vehicle Operation", false),
        Q("During a front-wheel skid, the front end of the vehicle will almost always go in a ______ direction, no matter how much the driver tries to steer or turn the wheel.", ["A) Slightly left", "B) Slightly right", "C) Jackknifed", "D) Straight"], "D", "Usually, front wheel skids happen when you drive too fast for the road conditions, and the vehicle will almost always skid in a straight direction, no matter how much you try to steer.", "Skid Control", true),
        Q("If you must turn quickly to avoid an accident, it's important to only turn enough to clear what is in the way because:", ["A) Turning smoothly helps you slow your vehicle more easily", "B) Drivers behind you may need to use the extra room outside of your turn radius", "C) Other drivers may not realize your intentions", "D) Turning sharply increases your chances of skidding or a rollover"], "D", "If you turn too quickly and sharply while trying to avoid something, you'll increase your chances of skidding or rolling your vehicle.", "Skid Control", true),
        Q("When driving a newer truck with a manual transmission, you come upon a long, steep downhill grade. You will probably have to use ______ gear that you used to climb the hill.", ["A) The same", "B) A lower", "C) A higher", "D) A neutral"], "B", "When you are going down a steep hill in a newer truck, you'll usually need to downshift to a lower gear than what you used to climb the hill.", "Mountain Driving", false),
        Q("When driving on a long downhill grade, downshifting can:", ["A) Cause severe damage to your clutch", "B) Slow the vehicle using engine compression and friction", "C) Help the vehicle maintain fuel efficiency", "D) Overheat the brake pads, which might require you to stop until they cool"], "B", "Downshifting on a long downhill grade can save your brakes and reduce the travelling speed of your vehicle using engine compression and friction.", "Mountain Driving", false),
        Q("When braking on a steep downhill grade, you should repeatedly brake to bring your speed to ___ mph below the designated 'safe speed' for that hill.", ["A) 20", "B) 10", "C) 5", "D) 15"], "C", "When braking on a steep downhill grade, you should press the brakes until your speed is 5 mph below the 'safe speed,' then allow your vehicle to reach the 'safe speed' again.", "Mountain Driving", false),
        Q("While driving a manual truck, you should use your ______ to help figure out the best times to upshift.", ["A) Tachometer", "B) Speed limit", "C) Accelerator", "D) Retarder"], "A", "Your tachometer will show you the motor's rpms. When you reach the top of the range, you know it's time to shift.", "Shifting Gears", false),
        Q("While driving, it is important to shift your attention and focus:", ["A) As far left and as far right as the road will allow", "B) From the center of the road to the furthest reach of your peripheral vision", "C) Back and forth between the center line and the line on the right", "D) Back and forth, near and far"], "D", "Good drivers know that it's important to look at least 12 to 15 seconds ahead of them, but they should continually shift their focus back and forth, near and far, to ensure they are being as careful as possible.", "Hazard Awareness", false),
        Q("There is another vehicle in the road ahead of you, and without action, you will collide with this vehicle. Which of these rules will help you most in this situation?", ["A) Braking is always the safest way to avoid a collision", "B) Turning is usually quicker than stopping when trying to avoid an obstacle", "C) Top-heavy vehicles tend to jackknife, so don't turn", "D) Moving to the left or oncoming lanes will give you the extra space needed to stop"], "B", "When you're coming up to an obstacle quickly, steering around the road hazard will almost always be faster than trying to come to a complete stop.", "Emergencies", true),
        Q("If you must steer to avoid impact on a multi-lane road because there is not enough time to stop, which of the following is the best action to take?", ["A) Steer to the left lane", "B) Steer to the right shoulder", "C) Brake hard to lessen the impact", "D) Downshift to reduce your speed"], "B", "If there is another car or hazard stopped in front of you, and you have no time to stop, steering to the right shoulder is best. That way, you don't push others in the left lane into other cars or oncoming traffic.", "Emergencies", true),
        Q("While driving on a two-lane road, an oncoming driver is headed straight for your vehicle. To avoid a collision, you should:", ["A) Brake hard using the 'stab braking' technique", "B) Steer to the left to avoid leaving the paved road", "C) Steer to the right to utilize the shoulder", "D) Brace yourself for the impact"], "C", "If a car is coming toward you in your lane, steer to the right. Chances are, if they do attempt to correct their steering, they will move back towards their own lane.", "Emergencies", true),
        Q("What is stab braking?", ["A) Braking hard to lock the wheels", "B) Braking hard to unlock the wheels", "C) Repetitively applying brakes and releasing when the wheels lock up", "D) Repetitively applying the brakes and releasing just before the wheels lock up"], "C", "Stab braking is an emergency braking technique you can use by pressing the brakes all the way and releasing when the wheels lock up to ensure that your vehicle can continue travelling in a straight line and allow you to turn if you need to.", "Braking", true),
        Q("During an emergency braking situation, skidding tires means:", ["A) Your vehicle is braking effectively", "B) Your brakes are overheating", "C) You no longer have control of your vehicle", "D) Your tires have excellent tread levels"], "C", "If you are forced to brake quickly in an emergency situation and your tires are skidding, you have lost control of your vehicle.", "Braking", true),
        Q("If a driving emergency forces you to leave the road at any time, which of the following strategies will help you?", ["A) Avoid using your brakes until you've dropped your speed to about 30 mph", "B) If possible, keep all four wheels on the same type of ground material, whether it be road or dirt", "C) Avoid the shoulder of the road, which often contains debris and other potential hazards", "D) Only use light pressure on your brakes to avoid skidding on loose surfaces"], "D", "If you must brake once you've left the road, wait until you've slowed to about 20 mph, and brake gently to avoid skidding.", "Emergencies", true),
        Q("Testing the stopping action of your service brakes should be done:", ["A) Only during times when your air pressure is greater than normal", "B) At a designated Service Brake testing facility", "C) When moving at approximately 5 mph", "D) By setting the parking brake and using a low gear"], "C", "Once your brakes are at a normal air pressure, release the parking brake. Then, move forward at about 5 mph and press the service brakes firmly. If there is any 'pulling' or unusual feel, you should complete further testing.", "Braking", false),
        Q("You have been asked to drive a vehicle transporting hazardous materials and the cargo does not require a placard. What requirements must you meet before transporting this hazardous material?", ["A) You need at least 10 years of driving experience", "B) You have to pass the Hazardous Materials Certification exam", "C) You must have the Hazardous Materials Endorsement on your CDL", "D) No additional certifications or endorsements are required to transport this cargo"], "D", "If the hazardous materials do not require a placard for transportation, you do not need any certifications or endorsements to transport the load.", "Hazardous Materials", true),
        Q("You have been asked to deliver hazardous material that requires a placard. However, you do not have a Hazardous Material Endorsement on your Commercial Driver's License. What should you do?", ["A) Only take the load if the trip is less than 50 miles", "B) Only transport the materials if the situation is considered an emergency", "C) Deliver the load to the nearest driver with a Hazardous Material Endorsement", "D) Refuse to move the cargo"], "D", "If you do not have the proper endorsement to transport hazardous material, you should not drive the load anywhere, no matter how short the distance might be.", "Hazardous Materials", true),
        Q("Tie-downs are used to secure loads on flatbed trailers. To keep the cargo from shifting, every _____ feet of cargo should have at least one tie-down.", ["A) 5", "B) 10", "C) 12", "D) 15"], "B", "There should be one tie-down placed for every ten feet of cargo. However, regardless of the load size, there should always be a minimum of 2 tie-downs to ensure the load is secure.", "Cargo", false),
        Q("When securing cargo on a flatbed trailer, no matter how small the cargo, you should always have at least ___ tie-downs to secure it.", ["A) 2", "B) 3", "C) 4", "D) 5"], "A", "When securing a load to a flatbed trailer, you should have a minimum of 2 tie-downs to secure the cargo, no matter how small it is.", "Cargo", false),
        Q("______ are used to protect people from spilled cargo.", ["A) Cargo straps", "B) Cargo covers", "C) Cargo netting", "D) Cargo blocks"], "B", "A cargo cover is used to protect people from any kind of spilled cargo or to protect the cargo from inclement weather.", "Cargo", false),
        Q("Hard steering and damage to the tires is often a result of:", ["A) Not enough weight on the steering axle", "B) Too much weight on the steering axle", "C) Not enough weight on the driving axles", "D) Too much weight on the driving axles"], "B", "If there is too much weight on the steering axle, it can make steering difficult, as well as potentially cause damage to the tires on the steering axle.", "Weight Limits", false),
        Q("Be sure to check the ______ fluid level during your pre-trip inspection of the engine compartment.", ["A) Power steering", "B) Temperature gauge", "C) Hydraulic brake", "D) Brake chamber"], "A", "Before any trip, check the power steering fluid level by using the dipstick. The level needs to be above the refill mark.", "Vehicle Inspection", false),
        Q("When inspecting your wheels and rims, you notice that a few lug nuts have rust streaks. This is an indication that:", ["A) The lug nuts are about to crack", "B) The lug nuts are probably loose", "C) The lug nuts are too old for use", "D) The lug nuts are going to be difficult to remove"], "B", "Rust streaks on a lug nut usually indicate that they are loose. Use a wrench to test for proper tightness.", "Vehicle Inspection", false),
        Q("Before taking a trip, you need to inspect your tires. Which of the following problems would require immediate action?", ["A) A 4/32 inch tread depth on front tires", "B) Valve stems have been cut", "C) Tread separation", "D) No fabric is visible through the tread or sidewall"], "C", "If your tire shows tread separation, which is when the tread of the tire pulls away from the tire's casing, you should immediately take steps to find a new, more suitable tire.", "Tires", true),
        Q("While en route, you need to complete regular inspections for which of the following?", ["A) Cargo weight", "B) Signs of overheating", "C) A working fire extinguisher", "D) Spare electrical fuses"], "B", "Any time you stop during your route, you should check the tires and wheels, as well as make sure that there are no signs of overheating anywhere on the truck body.", "Vehicle Inspection", false),
        Q("Cargo inspections should occur at each of the following times EXCEPT:", ["A) Before the start of the trip", "B) Within the first 50 miles of the start of the trip", "C) After two hours of non-stop driving", "D) After every break you take while driving"], "C", "Cargo checks are required before the trip begins, sometime in the first 50 miles of the trip, after 3 hours or 150 miles, and after every break taken while driving.", "Cargo", false),
        Q("If your vehicle has overheated and you need to remove the radiator cap, you can tell that it's cool enough to open if:", ["A) The vehicle has enough coolant in its system", "B) The gauge shows a low temperature", "C) You can touch the cap with your bare hand without injury", "D) You can see coolant in the overflow containers"], "C", "If your vehicle has overheated, it's important to never remove the radiator cap if you have a pressurized system. This can cause severe injury. If the cap is cool to the touch, it's probably safe to remove the cap.", "Vehicle Inspection", false),
        Q("You are driving a 40-foot truck at 50 mph. If the road is dry and visibility is good, what is the minimum space you should keep between yourself and the vehicle in front of you?", ["A) 5 seconds", "B) 6 seconds", "C) 7 seconds", "D) 10 seconds"], "A", "For every ten feet of vehicle length, you should allow one second of space between yourself and the car in front of you. However, if you are travelling more than 40 mph, you need to add one additional second. This situation would require a minimum of 5 seconds of space ahead.", "Following Distance", true),
        Q("When road conditions are ideal, what is the least amount of space you should keep between yourself and the car in front of you if you are driving a 50-foot vehicle at 50 mph?", ["A) 4 seconds", "B) 5 seconds", "C) 6 seconds", "D) 8 seconds"], "C", "In general, you should have one second of space for every ten feet of vehicle you're driving. However, for speeds greater than 40 mph, you should add an additional second. This example would require 6 seconds of space.", "Following Distance", true),
        Q("When following another vehicle, it's important to remember that:", ["A) Your heavier weight means you'll need more stopping distance", "B) You should keep at least four seconds of space between you and the car in front of you", "C) You should begin braking as soon as you see the car ahead use their blinker", "D) You should have two seconds of space for every ten feet of trailer on your vehicle"], "A", "Because your vehicle is so heavy, it's important to keep adequate space in front of you since you'll require a greater stopping distance.", "Following Distance", true),
        Q("Which of the following statements about alertness while driving is TRUE?", ["A) The only thing that will help you overcome fatigue is rest", "B) 80 mg of caffeine can provide up to two hours of alert driving", "C) Cold medicine often provides a driver with a renewed sense of alertness", "D) Loud music can help keep you awake during nighttime driving"], "A", "Sleep is the only cure for fatigue. Nothing else can compensate for a lack of sleep.", "Fatigue", true),
        Q("Judgment and self-control are affected by:", ["A) A high blood alcohol concentration (BAC)", "B) The duration of a trip", "C) Inclement weather and hazardous road conditions", "D) The number of years of experience a driver has"], "A", "As your blood alcohol concentration (BAC) goes up, the first thing to be impaired is your judgment and self-control, both of which are necessary in order to be a good driver.", "Alcohol Rules", true),
        Q("Which of the following statements about alcohol consumption is FALSE?", ["A) A 12-ounce glass of beer has the same alcohol content as a half-ounce shot of 80-proof liquor", "B) Alcohol consumption impairs both reaction time and depth perception", "C) Coffee will not help you become sober more quickly", "D) Having a blood alcohol concentration (BAC) of 0.04 or below means that you are capable of driving"], "D", "Just because someone's blood alcohol concentration (BAC) is below the legal limit, that does not mean they are capable of operating a vehicle. A driver should never operate their vehicle within 4 hours of consuming alcohol.", "Alcohol Rules", true),
        Q("If you've had two drinks, each with one ounce of alcohol, it will typically take your body about ___ hours to remove the alcohol from your system.", ["A) 2", "B) 4", "C) 6", "D) 8"], "C", "The human liver can generally process one-third of an ounce of alcohol in an hour, so it would take 6 hours to process the two ounces of alcohol in those drinks.", "Alcohol Rules", true),
        Q("If the road has become covered in black ice, which of the following would be the best action to take?", ["A) Downshift to reduce your speed", "B) Stop driving as soon as it's safe to do so", "C) Tap the brakes repetitively to avoid skidding or loss of traction", "D) Apply the brakes through all curves to maintain traction"], "B", "If the road is covered in black ice, it's best to stop driving as soon as you can safely do so. Return to your route once conditions have improved.", "Winter Driving", true),
        Q("During your en route inspection, you should check the tires, wheels, and the body of your truck for signs of:", ["A) Leaking", "B) Overheating", "C) Standing water", "D) Low pressure"], "B", "During your en route inspection, check your tires, wheels, and the body of your vehicle for signs of overheating. This is a good fire prevention strategy.", "Vehicle Inspection", false),
        Q("Sometimes, pumping the brake pedal will help generate enough pressure to stop a vehicle if you are experiencing:", ["A) Hydraulic brake failure", "B) Tire failure", "C) ABS malfunction", "D) Drive-wheel skids"], "A", "If you experience hydraulic brake failure, you can downshift, use the parking brake, or pump your brakes in an effort to reduce speed or stop the vehicle.", "Braking", true),
        Q("Which of the following terms describes the distance your vehicle will travel between the time it takes for your brain to recognize a hazard and when you actually begin to brake?", ["A) Perception distance", "B) Braking distance", "C) Total stopping distance", "D) Reaction distance"], "D", "Reaction distance is the time it takes for you to go from recognizing a hazard to actually pressing the brake.", "Stopping Distance", true),
        Q("You are coming up to an underpass and you aren't sure your vehicle has enough space overhead to pass through safely. You should:", ["A) Double-check the posted height", "B) Go slowly and take another route if necessary", "C) Add weight to your trailer to reduce its height", "D) Assume the height is enough to allow safe passage"], "B", "If you aren't sure that your vehicle will fit beneath a bridge or overpass, travel slowly. If you don't think there's enough space, take another route.", "Space Management", false),
        Q("When inspecting your vehicle before a trip, make sure that the ______ is/are secured so that they don't snag, rub, or wear down.", ["A) Electrical wiring", "B) U-bolts", "C) Cross members", "D) Cell caps"], "A", "Be sure that all electrical wiring is secure. If it rubs, snags, or wears down, this can cause mechanical issues.", "Vehicle Inspection", false),
        Q("At the scene of an accident, your role should be:", ["A) To move people out of their vehicles in case the motor catches on fire", "B) To allow qualified personnel to care for the injured unless you're asked to assist", "C) To ensure any injured persons remain cool and comfortable", "D) To avoid contact with any injured persons to avoid liability"], "B", "In general, you should allow the qualified emergency responders to care for the injured unless you're specifically asked to assist.", "Accident Procedures", false),
        Q("A 4-inch, diamond-shaped label on a vehicle indicates:", ["A) Overweight cargo", "B) A baffled tank", "C) Animals onboard", "D) Hazardous materials"], "D", "All hazardous materials are labeled with a 4-inch diamond shape indicating the class of hazard.", "Hazardous Materials", false),
        Q("Which of the following is NOT a common cause of fires?", ["A) Improper handling of flares", "B) Under-inflated tires", "C) Poor cargo ventilation", "D) All of these are common causes of fire"], "D", "Improper flare handling, underinflated tires, and poor cargo ventilation are all common causes of fires.", "Fire Safety", false),
        Q("Which of the following is the most effective way to plan for an escape or maneuver if a hazard becomes apparent on the road in front of you?", ["A) Stay alert for the entire duration of your drive time", "B) Watch for traffic cones, construction signs, and other posted road information", "C) Avoid areas where traffic hazards are most common", "D) Firmly grip the steering wheel at all times to ensure you have maximum control"], "A", "The best, most effective way to prepare for an emergency maneuver or escape is to remain alert for the entire time you are on the road.", "Hazard Awareness", false),
        Q("You have to make a stop on the side of the road, and you've pulled out the reflective triangles to place on the road. Which is the most effective way to carry these triangles?", ["A) Place them firmly under your arm so they don't blow away", "B) Open them to their full size before walking any distance down the road", "C) Hold them with the reflective side facing oncoming traffic so they notice you", "D) Point the reflective side towards the ground so as not to distract oncoming traffic"], "C", "To make sure the other drivers on the road see you, hold the reflectors with their reflective sides facing oncoming traffic.", "Emergency Equipment", false),
        Q("The space behind your vehicle that mirrors can't show you is called the:", ["A) Dark area", "B) Blind zone", "C) Dark spot", "D) Blind spot"], "D", "The areas around your vehicle that your mirrors can't show you are called blind spots. Regularly check your mirrors so you are aware of the location of other vehicles around you.", "Mirrors", false),
        Q("When driving at highway speeds, you should look about 12 to 15 seconds ahead, which is the same as:", ["A) 1/2 a mile", "B) 3/4 of a mile", "C) 1/4 of a mile", "D) 1 mile"], "C", "When driving at highway speeds, you should look about 12 to 15 seconds ahead, or 1/4 of a mile.", "Hazard Awareness", false),
        Q("When is hydroplaning most likely to occur?", ["A) When traveling at speeds greater than 20 mph", "B) When driving through small puddles", "C) When tire pressure is low", "D) When tire tread carries away ground water"], "C", "Hydroplaning is most likely to occur when tire pressure is low or when the tread has been worn away.", "Hydroplaning", true),
        Q("When driving in the winter or bad weather, it is especially important to check ______ before starting any trip.", ["A) Cargo tie-downs", "B) Lights and reflectors", "C) Electrical wires", "D) Engine belts"], "B", "Because visibility will be much lower during inclement weather, it's especially important to ensure your lights and reflectors are clean and working properly for good visibility.", "Winter Driving", false),
        Q("A ______ will help control the forward and backward liquid surges.", ["A) Smooth bore tank", "B) Shut-off valves", "C) Baffled tank", "D) Header boards"], "C", "A baffled tank has bulkheads with small holes in them, which help control the flow of liquid and reduce the effects of forward and backward surges.", "Tank Vehicles", false),
        Q("Which of the following is the best strategy to take when your vehicle is being tailgated?", ["A) Flash your brakes to let them know they are too close", "B) Increase your speed to create more space", "C) Reduce your speed to give them time to move around you", "D) Increase the following distances between yourself and the car ahead"], "D", "If you are being tailgated, it's best to avoid quick changes and to increase your following distance. That way, you will have more space to make changes if something happens on the road ahead.", "Space Management", false),
        Q("If you're forced off the road onto the shoulder and need to return to the road without stopping the vehicle, you should:", ["A) Ease your tires gradually back onto the road", "B) Hold the wheel tightly and turn sharply back to the road", "C) Brake hard and steer gradually back towards the road", "D) Use your emergency flashers to alert others of your presence"], "B", "If you have to return to the road before you can make a complete stop, grip the wheel firmly and turn sharply to get back on the road. Easing onto the road may result in an unexpected tire grab.", "Emergencies", true),
        Q("When driving in heavy rain or through standing water, your brakes will get wet. When this happens, you might:", ["A) Experience a wheel fire", "B) Lose braking power", "C) Reduce the risk of hydroplaning", "D) Need to use tire chains"], "B", "Water in the brakes can lead to the brakes becoming weak, to apply unevenly, or to grab. When your brakes get wet, you may experience wheel lockups, pulling to the side, or a loss of braking power.", "Braking", true),
        Q("When driving in cold weather, you should:", ["A) Replace your engine's coolant with antifreeze", "B) Leave the ice around the radiator to make sure it doesn't overheat", "C) Use windshield washer antifreeze to keep the fluid from turning to ice", "D) Drive with your windows down to avoid an exhaust system leak"], "C", "During cold weather, it's important to use windshield washer antifreeze so that your washer fluid doesn't turn to ice.", "Winter Driving", false),
        Q("A small cardboard box in your path of travel is a:", ["A) Potential road hazard", "B) Harmless road litter", "C) A good tool to help slow your vehicle", "D) A vital part of the road's structure"], "A", "A cardboard box might appear harmless, but it could contain solid or heavy materials that can cause damage to your vehicle. It's best to avoid them using smooth, safe steering maneuvers.", "Hazard Awareness", false),
        Q("If you experience brake failure going downhill, your best chance of avoiding damage or a collision would be:", ["A) Your emergency hand brake", "B) Using the stab braking technique", "C) Using a low gear", "D) An escape ramp"], "D", "If you experience brake failure on a downhill, your safest, most effective option is to use an escape ramp. If no escape ramp is available, take the least hazardous escape route you can.", "Emergencies", true),
        Q("If you choose to drive while under the influence, you increase your risk of an accident as well as:", ["A) Your chance of losing your license", "B) Your likelihood of using drugs", "C) Your level of self-control", "D) Your chance of becoming ill"], "A", "If you drive while under the influence, you're more likely to have an accident, which means you're more likely to lose your driver's license.", "Alcohol Rules", true),
        Q("In the event of a drive-wheel braking skid, you should stop braking and:", ["A) Engage the clutch", "B) Search for an escape ramp", "C) Hold the steering wheel firmly", "D) Countersteer"], "D", "If you experience a drive-wheel braking skid, you should stop braking to allow the rear wheels to roll. Then, because the vehicle will have a tendency to continue turning, you'll need to countersteer to correct your direction of travel.", "Skid Control", true),
        Q("Which of the following types of loads tend to have a high center of gravity?", ["A) Oversized loads", "B) Dry bulk loads", "C) Containerized loads", "D) Hazardous materials"], "B", "Dry bulk loads often have a high center of gravity and can shift during transport. It's important to be extremely cautious while turning or taking curves.", "Cargo", false),
        Q("Rear-wheel acceleration skid can be corrected by:", ["A) Slowly applying the brakes", "B) Using the stab braking technique", "C) Removing all pressure from the accelerator", "D) Counter-steering to straighten the wheels"], "C", "A rear-wheel acceleration skid happens when there isn't enough traction and too much power to the wheels. This can be corrected by taking your foot off of the accelerator.", "Skid Control", true),
        Q("When using a fire extinguisher, you should:", ["A) Aim toward the tips of the flames to let the material trickle down", "B) Point the nozzle towards the base of the flames", "C) Get as close to the fire as you are comfortable standing", "D) Spray in short, quick bursts to avoid adding too much oxygen to the fire"], "B", "Always point the nozzle and spray towards the base of the flame to maximize your ability to extinguish the fire.", "Fire Safety", false),
        Q("A ______ can be caused by turning too sharply, over-accelerating, or braking too hard.", ["A) Skid", "B) Jackknife", "C) Stumble", "D) Lane straddle"], "A", "If you turn too sharply, over accelerate, or brake too hard, you can cause your tires to skid.", "Skid Control", true),
        Q("The use of your horn should be limited as much as possible because:", ["A) It strains your battery", "B) It's not as effective as flashing your headlights", "C) It might startle the other drivers", "D) It's considered rude and unnecessary"], "C", "Using your horn might startle other drivers, which might cause them to drive unsafely. For this reason, limit the use of your horn.", "Communication", false),
        Q("When backing up with a trailer on a curved path, you should:", ["A) Turn away from the driver's side so you can see", "B) Ask for help from someone nearby", "C) Only use the driver's side mirrors to ensure accuracy", "D) Back towards the driver's side so you can see properly"], "D", "It's usually best to try to back up in a straight line, but if you have to take a curved path, back up towards the driver's side so you can see well.", "Backing Safely", false),
        Q("Some liquid tanks have dividing walls called:", ["A) Retarders", "B) Baffles", "C) Shutters", "D) Bulkheads"], "D", "A bulkhead is a dividing wall that splits liquid tanks into smaller tanks.", "Tank Vehicles", false),
        Q("With a blood alcohol concentration (BAC) of 0.40 or higher, many people will:", ["A) Be unfit to drive a vehicle", "B) Fall unconscious or even die", "C) Experience a reduction in reaction time", "D) Feel less inhibited"], "B", "A person with a blood alcohol concentration (BAC) level of 0.40 or higher will most often lose consciousness, and some will even die.", "Alcohol Rules", true),
        Q("What is the term for the time it takes for your eyes to see a hazard until your brain recognizes it?", ["A) Reaction distance", "B) Braking distance", "C) Perception distance", "D) Total stopping distance"], "C", "Perception distance is the time it takes for your eyes to see a hazard until your brain recognizes it.", "Stopping Distance", true),
        Q("If your blood alcohol concentration (BAC) is ______ percent or higher, you have surpassed the legal limit for operating a CMV.", ["A) 0.03", "B) 0.04", "C) 0.05", "D) 0.06"], "B", "It's illegal to operate a commercial motor vehicle (CMV) with a BAC of 0.04 percent or higher and will result in losing your CDL for at least 1 year for a first offense.", "Alcohol Rules", true),
        Q("______ are used to stop runaway vehicles safely.", ["A) Emergency ramps", "B) Off ramps", "C) Escape ramps", "D) Turnpike ramps"], "C", "An escape ramp is often found on mountainous roads, and they use loose, soft material to help stop runaway vehicles safely without injuring the driver or passengers.", "Emergencies", true),
        Q("When driving long distances, it's important to:", ["A) Stop only once every three hours to avoid a delay in your delivery time", "B) Take breaks often and whenever you feel drowsy", "C) Drink something with caffeine and roll down your windows to maximize alertness", "D) Consume heavy foods that will keep you full so you don't have to stop as often"], "B", "When driving long distances, the best way to maintain alertness is to take breaks often (about every two hours or 100 miles), or whenever you feel tired or drowsy.", "Fatigue", false),
        Q("If your vehicle has a high center of gravity, you should:", ["A) Overload the vehicle so that it brings the center of gravity lower", "B) Secure your cargo with one tie-down for every ten feet", "C) Place heavier cargo beneath lighter cargo", "D) Use a lock to directly attach the cargo to the frame of the vehicle"], "C", "If your vehicle has a high center of gravity, it's important to place the load as far down as possible, with the heaviest cargo on the bottom and the lightest on the top.", "Weight Limits", false),
        Q("In some situations, your heavier vehicle will not be able to travel as quickly as normal traffic. In these instances, you should:", ["A) Use your blinkers to signal to drivers when it is safe to pass you", "B) Notify law enforcement officers of your presence", "C) Pull to the shoulder to allow other vehicles to pass you", "D) Use your flashers when it is legal to do so"], "D", "Often, if drivers are moving quickly, they may not realize how fast they are approaching slow-moving vehicles. For this reason, if you must travel slowly, use your flashers when legal to alert other drivers.", "Speed Management", false),
        Q("Which of the following best describes controlled braking?", ["A) Braking hard until the wheels lock and release", "B) Pushing the brakes hard, but not hard enough to lock the wheels", "C) Using downshifting to lower your speed", "D) Using consistent pressure on the brakes to bring the vehicle to a smooth stop"], "B", "Controlled braking is used in an emergency situation, and a driver will press the brakes hard, but not hard enough to lock the wheels.", "Braking", true),
        Q("Which of the following statements about tank vehicles is TRUE?", ["A) Unbaffled tanks have bulkheads to divide the tank into smaller tanks", "B) Liquids often shrink as they warm, so it's important to fill the tank completely", "C) Tank vehicles are often very bottom heavy, so they move more slowly", "D) Because liquid moves so much during travel, hauling liquids requires a special skill set"], "D", "You'll need a special set of skills to haul liquid because it will move around so much and create a high center of gravity.", "Tank Vehicles", false),
        Q("It's important to ______ in order to prevent skidding.", ["A) Use stab braking", "B) Adjust to road conditions", "C) Properly secure cargo", "D) Break in new tread on your tires"], "B", "Skidding occurs for a number of reasons and in a variety of conditions. For this reason, it's important to adjust your driving to the situation in order to prevent skidding.", "Skid Control", true),
        Q("When performing a hydraulic brake check, you should pump the brakes 3 times and hold for 5 seconds. During that 5 seconds:", ["A) The brake should slowly depress", "B) The brake should not move", "C) The brake pedal should push back against your foot", "D) The warning buzzer should sound"], "B", "During that 5 seconds after pumping the brakes, the brake pedal should not move or depress.", "Braking", false),
        Q("Which class of fire extinguisher is designed for use on wood, paper, and cloth?", ["A) Class A", "B) Class B", "C) Class C", "D) Class D"], "A", "Class A fire extinguishers use cooling and quenching effect for use on wood, paper, cloth, and other ordinary combustible materials.", "Fire Safety", false),
        Q("Which of the following would require you to turn your headlights on during the day?", ["A) To signal others to merge in front of you", "B) To improve visibility during rain or snow", "C) To improve visibility two hours before sunset", "D) When visibility isn't clear enough to see 1,000 feet ahead"], "D", "If visibility doesn't let you see 1,000 feet ahead, if it's half an hour after sunset, or if hazardous weather (snow, rain, or fog) require the use of windshield wipers, you will need to use your headlights.", "Lighting", false),
        Q("In what situation would you NOT be required to wear a seatbelt?", ["A) During slow-moving freeway traffic", "B) When stopped at a red light", "C) When state law does not require a seat belt for commercial vehicle drivers", "D) You are always required to wear a seatbelt"], "D", "Whenever you are travelling in a moving vehicle, you should always wear your seatbelt.", "Safety", false),
        Q("When inspecting your suspension, you notice that a few leaf springs are broken or missing. How many broken or missing leaf springs would put the vehicle 'out of service'?", ["A) One fourth of them", "B) One fifth of them", "C) One third of them", "D) Half of them"], "A", "If one fourth of a vehicle's leaf springs have been damaged or are missing, the vehicle will be considered 'out of service.'", "Vehicle Inspection", false),
        Q("When the road is slippery, you should:", ["A) Keep more space in front of your vehicle", "B) Follow at a normal distance", "C) Follow at a closer distance", "D) Avoid following another vehicle at all costs"], "A", "When the road is slippery, you'll need more stopping distance. For this reason, you should keep more space between you and the vehicle ahead.", "Space Management", false),
        Q("When driving down a steep downhill grade, press the brake until you are ______ below your safest speed, allow the downgrade to bring you back up to your safe speed, and repeat as needed.", ["A) 10 mph", "B) 20 mph", "C) 15 mph", "D) 5 mph"], "D", "When going down a steep downhill grade, you should brake until you're 5 mph below your safe speed, let your speed back up to the safe speed, and brake again to 5 mph below until you've reached more level roads.", "Mountain Driving", false),
        Q("You can figure out how much liquid you can load in your vehicle based on how much the liquid will expand, the weight of the liquid, and:", ["A) The legal weight limits", "B) The number of bulkheads in your tank", "C) How well your vehicle handles surges", "D) Whether or not your tank is baffled"], "A", "The amount of liquid you can transport will depend on how much the liquid will expand, the weight of the liquid, the legal weight limits, and the temperature of the load.", "Tank Vehicles", false),
        Q("Mirrors can be used to check for traffic flow behind you, the condition of your tires and cargo, and:", ["A) Traffic flow ahead of you", "B) Your 'blind spot'", "C) The clearance you have for tight maneuvers", "D) The condition of your engine compartment"], "C", "Mirrors can be used to check rear traffic flow, the condition of tires and cargo, and the clearance around the vehicle during tight maneuvers.", "Mirrors", false),
        Q("Which of the following statements about overhead clearance is CORRECT?", ["A) Height posts are carefully monitored, so you can depend on them to be correct", "B) If a loaded vehicle can clear a bridge, it will be capable of clearing the same bridge when it is empty as well", "C) Before backing into an area, it's wise to get out to check for wires and trees that might be missed from the cab of the vehicle", "D) When a road causes a vehicle to tilt, staying close to the shoulder can help keep the vehicle more level"], "C", "From the driver's seat, it's easy to miss low hanging trees and wires. Get out of the vehicle to do a quick check before backing up into that space.", "Space Management", false),
        Q("During your trip, it's important to inspect your cargo security:", ["A) Once every hour", "B) Once every 100 miles", "C) After each of your breaks", "D) Every time you leave the freeway"], "C", "Every time you take a break, you should inspect critical areas of your vehicle, including your tires and brakes, as well as the security of your cargo.", "Cargo", false),
        Q("The three types of vehicle inspections include the vehicle inspection, after-trip inspection, and:", ["A) Post-break inspection", "B) Trip inspection", "C) Pre-cargo inspection", "D) Post-stop inspection"], "B", "The three types of vehicle inspections include the vehicle inspection, after-trip inspection, and trip inspection.", "Vehicle Inspection", false),
        Q("Regardless of cargo size, it should always have at least ______ tie-down(s).", ["A) 1", "B) 2", "C) 3", "D) 4"], "B", "No matter how small a load is, you'll always need at least two tie-downs. If the load is larger, it needs at least 1 tie-down for every ten feet of cargo.", "Cargo", false),
        Q("During a pre-trip inspection, defects like cracked drums, oil or grease on the shoes or pads, and thin shoes are all something that might affect your:", ["A) Tires", "B) Brakes", "C) Suspension", "D) Steering"], "B", "Cracked drums, oil or grease on the shoes or pads, and thin shoes are all defects that involve your brakes.", "Brakes", false),
        Q("To inspect your lights, you should set the parking brake and turn off the engine while making sure to take the keys with you. Then:", ["A) Ensure that all windows are rolled up", "B) Lock your cab doors", "C) Turn on your headlights and emergency flashers", "D) Ensure that the driver's door is clean"], "C", "When you want to inspect your lights, you should start by setting the parking brake and turning off the engine. Don't forget the keys inside the cab. Then, turn on the headlights or low beams, along with the 4-way flashers.", "Vehicle Inspection", false),
        Q("During an engine compartment inspection, you need to start the engine. To do this, be sure the parking brake is set, and depress the clutch. Next, you should:", ["A) Start the engine", "B) Put it into a neutral gear", "C) Pump and hold the brakes", "D) Release the clutch slowly"], "B", "Once you've set the parking brake and depressed the clutch, you should put the gearshift lever in Neutral, or Park if you've got an automatic transmission. Finally, you should start the engine and slowly release the clutch.", "Vehicle Inspection", false),
        Q("While driving on a slippery road, you should:", ["A) Use brakes through each turn", "B) Utilize the stab braking technique", "C) Decrease your following distance", "D) Reduce your speed gradually"], "D", "When roads are slippery, your vehicle won't have as much traction. For this reason, you should avoid hard braking, opting instead to slow down gradually, as well as increase your following distance.", "Speed Management", false),
        Q("Which of the following terms refers to the total weight of a single vehicle and its load?", ["A) Gross Vehicle Weight", "B) Gross Combination Weight", "C) Tire Load", "D) Coupling Device Capacity"], "A", "The Gross Vehicle Weight is the total weight of a vehicle, including its load.", "Weight Limits", false),
        Q("Your front tires require at least ___ inch of tread depth.", ["A) 2/32", "B) 4/32", "C) 6/32", "D) 8/32"], "B", "You need to have at least 4/32 inch of tread depth in every major groove on your front tires. All other tires require a minimum of 2/32 inch of tread depth.", "Tires", false),
        Q("If your vehicle has been overloaded, it will have a negative effect on steering, braking, and:", ["A) Height clearance", "B) Coolant levels", "C) Visual acuity", "D) Speed control"], "D", "If a vehicle has been overloaded, it won't be able to steer, brake, or control speed as effectively. In addition, it will have a harder time going uphill, and it will pick up greater speed on downgrades.", "Weight Limits", false),
        Q("During a trip, you should recheck your cargo every:", ["A) 2 hours or 120 miles", "B) 2 hours or 100 miles", "C) 3 hours or 150 miles", "D) 3 hours or 180 miles"], "C", "During a trip, you should recheck your cargo after you've driven 3 hours or 150 miles to ensure everything is secure.", "Cargo", false),
        Q("Brake fade happens when you use the brakes too much, causing excessive heat. This heat causes the brake drum to expand, meaning the ______ won't have the same amount of contact or pressure on the drum.", ["A) Brake chamber", "B) Brake shoe", "C) Brake cam", "D) Return spring"], "B", "When you overuse your brakes, it creates too much heat. This causes the brake drum to expand, meaning the brake shoe has to move farther to make contact with the drum. Then, when it does make contact, the pressure isn't as strong. This reaction is called brake fade.", "Brakes", true),
        Q("If you are forced to make a stop on a straight, 4-lane, divided highway, at what distance behind the vehicle should you place the three reflective triangles?", ["A) 50 feet, 100 feet, and 150 feet", "B) 100 feet, 200 feet, and 300 feet", "C) 10 feet, 100 feet, and 200 feet", "D) 10 feet, 50 feet, and 100 feet"], "C", "Whenever you're forced to stop on a one-way or divided highway, you must place your reflective triangles 10 feet, 100 feet, and 200 feet behind the vehicle. These must be placed within 10 minutes of stopping.", "Emergency Equipment", true),
        Q("You should inspect your cargo before starting your trip, again within the first 50 miles, after you've driven 3 hours or 150 miles, and:", ["A) After crossing a state line", "B) After going over railroad crossings", "C) When you're 50 miles from your destination", "D) After each break you take"], "D", "Inspect your cargo after every break you take to make sure that everything has remained secure.", "Cargo", false),
        Q("Which of the following terms refers to the manufacturer's specified value indicating the loaded weight of a single vehicle?", ["A) Gross Combination Weight Rating", "B) Tire Load", "C) Gross Vehicle Weight Rating", "D) Coupling Device Capacity"], "C", "The Gross Vehicle Weight Rating is the loaded weight of a single vehicle as specified by the manufacturer.", "Weight Limits", false),
        Q("When driving a vehicle with a dual air system, you notice that one air system is really low on pressure. That means your brakes will not be working well:", ["A) On the right or left side", "B) In the front or rear", "C) Near the driver's side", "D) Unless you're driving without cargo"], "B", "A dual air system means you've got two brake systems both functioning from the same brake control. However, if one system has low pressure, your brakes won't be working in either the front or the rear of the vehicle.", "Air Brakes", true),
        Q("It is important to ______ to communicate your intentions and to keep others from trying to pass you.", ["A) Flash your hazards", "B) Use your turn signal", "C) Tap your brakes", "D) Use hand signals"], "B", "Using your turn signal can communicate your intentions to other drivers, as well as keep them from trying to pass you.", "Communication", false),
        Q("Federal regulations require the combined working load limit of a tie-down system to be at least ___ times the weight of the article or group of articles being secured.", ["A) Two", "B) Three", "C) Half", "D) One-third"], "C", "Federal regulations say that the combined working load limit of a tie-down system has to be at least half times the weight of the article(s) being secured.", "Cargo", false),
        Q("If there is not enough weight on the front axle, it will:", ["A) Leave the steering axle weight too light to safely steer", "B) Cause rapid deterioration of tire tread", "C) Add too much weight to the driving axle", "D) Make the vehicle top-heavy"], "A", "If there isn't enough weight on the front axle, the weight on the steering axle will be too light to steer safely, which can also lead to poor tire traction.", "Weight Limits", false),
        Q("You are still responsible for inspecting the cargo and ensuring it's properly balanced and secured, even if:", ["A) You did not load the cargo yourself", "B) You do not plan to transport the load", "C) The load will be moved to another trailer", "D) The load is sealed"], "D", "Even if you didn't load the cargo, you are still responsible for inspecting it, unless it is a sealed load, which you cannot inspect.", "Cargo", false),
        Q("Which of the following should be checked for looseness, sticking, broken parts, or incorrect settings?", ["A) Accelerator", "B) Coolant", "C) Safety Belt", "D) Mirrors"], "A", "You should make sure to check your steering wheel, clutch, accelerator, brake controls, transmission controls, interaxle differential lock, horn, windshield wiper and washer, and lights for signs of looseness, sticking, broken parts, and incorrect settings.", "Vehicle Inspection", false),
        Q("Before driving a bus, you should always check the interior for clear aisles and stairwells, handholds and railings in working condition, as well as:", ["A) The condition of your tires", "B) Clean lights and reflectors", "C) That emergency exits can open easily", "D) That no one has left behind any items"], "C", "Before driving a bus, you should make sure that emergency exits are clearly labeled and can be operated with ease.", "Bus", false),
        Q("During your pre-trip internal inspection, you should make sure:", ["A) The parking brake is set or the wheels are chocked", "B) The engine is ready and running", "C) The hood is raised", "D) The shock absorbers are secure"], "A", "Before you start your inspection, make sure that the vehicle will not move of its own accord by setting the parking brake or chocking the wheels. This will ensure your safety, as well as the safety of those around you.", "Vehicle Inspection", false),
        Q("During a pre-trip inspection on a bus, you should check the back emergency door:", ["A) To ensure no passengers can reach it", "B) To ensure the buzzer has been disconnected", "C) To ensure the door is closed completely", "D) To ensure the handle has been removed"], "C", "When inspecting a bus, be sure to check the back emergency door to ensure it's been closed properly.", "Bus", false),
        Q("What is the term for the weight transmitted to the ground by one axle or set of axles?", ["A) Tire Load", "B) Coupling Device Capacity", "C) Gross Vehicle Weight", "D) Axle Weight"], "D", "The axle weight is the weight transmitted to the ground by a single axle or set of axles.", "Weight Limits", false),
        Q("You should inspect your mirrors and windshield for cracks, dirt, ______, and other visual obstructions that would make it difficult to see well.", ["A) Temperature", "B) Stickers", "C) Clean areas", "D) Warning lights"], "B", "Your mirrors should be clear of all cracks, dirt, illegal stickers, and other visual obstructions to help ensure that you'll be able to see well while driving.", "Mirrors", false),
        Q("If you experience a tire blow out, you should hold the steering wheel tightly and:", ["A) Press evenly on the brake", "B) Press the brake as firmly as you can", "C) Stay off the brake", "D) Use stab braking to reduce speed"], "C", "If you experience a tire blow out, it's important to stay off the brake to avoid losing control of the vehicle.", "Emergencies", true),
        Q("When driving during hot weather, you can help keep the engine cool by making sure:", ["A) The v-belts are loosened", "B) The antifreeze has been replaced with water", "C) To travel at higher speeds", "D) The engine has enough oil"], "D", "Oil helps cool an engine, so be sure to have enough when driving in hot weather, and monitor the oil temperature gauge as you drive.", "Vehicle Inspection", false),
        Q("When driving through work zones, it is important to:", ["A) Use your hazard lights to warn other drivers", "B) Use blinkers to help direct traffic flow around you", "C) Adhere to the posted speed limit", "D) Drive quickly to avoid causing traffic congestion"], "C", "Speeding through a work zone is the number one cause of death for road workers. For this reason, it's important to abide by the posted speed limits; slowing down may be necessary in instances of inclement weather or a worker near the road.", "Speed Management", false),
        Q("During a pre-trip inspection of your vehicle, you learn that you have an exhaust leak. You should:", ["A) Inform a mechanic at your destination", "B) Cancel your trip", "C) Report the problem and find a replacement vehicle", "D) Continue on your route as usual"], "C", "If you find a serious problem during your pre-trip inspection, you should report the problem and find a replacement vehicle to continue on your trip.", "Vehicle Inspection", false),
        Q("A defect in the ______ is a great danger because it can let poison into the vehicle's cab or sleeper berth.", ["A) Steering system", "B) Suspension system", "C) Exhaust system", "D) Braking system"], "C", "A problem with the exhaust system can be deadly because it lets poison into the vehicle's cab or sleeper berth. Before driving, inspect the exhaust system for broken or missing pieces, parts rubbing together, or leaks.", "Vehicle Inspection", false),
        Q("Blood alcohol concentration (BAC) level is measured using a person's:", ["A) Height", "B) Age", "C) Gender", "D) Weight"], "D", "BAC level is measured by using the amount of alcohol a person has consumed and their weight. For this reason, lighter weight individuals can have higher BAC levels when drinking less alcohol compared to heavier individuals.", "Alcohol Rules", true),
        Q("Front-end header boards protect you from your cargo when:", ["A) Opening the back doors", "B) Releasing tie-downs straps", "C) Accidents or emergency stops occur", "D) Liquid surges occur"], "C", "Your front-end header board, also known as a 'headache rack,' is there to protect you from your cargo in the event of an accident or emergency stop.", "Cargo", false),
        Q("Loose cargo is a danger to you and other drivers:", ["A) During times of slow travel", "B) If you surpass the speed limit", "C) If you make a quick stop or have an accident", "D) If you're forced to conduct tire maintenance"], "C", "If your cargo is not secure, it can cause great bodily harm if you have to stop quickly or have an accident. Even more, it can harm other drivers if it falls off your vehicle while you're driving.", "Cargo", false),
        Q("An empty tank vehicle may:", ["A) Have better handling", "B) Take longer to stop", "C) Be able to travel at faster speeds", "D) Not be permitted to have bulkheads"], "B", "Because an empty tank will not weigh as much, it will not have the same level of traction as a full tank. For this reason, empty tanks may require a greater stopping distance than full ones.", "Tank Vehicles", false),
        Q("As you inspect the seats of your bus, what should you look for?", ["A) All seats are secured to the bus", "B) All seats have seat belts", "C) All seats have a separate handhold or railing", "D) All seats have an emergency buzzer"], "A", "When you inspect a bus, you should make sure each seat is securely fastened to the bus.", "Bus", false),
        Q("You should renew your medical certificate every:", ["A) 1 year", "B) 2 years", "C) 3 years", "D) 5 years"], "B", "All medical certificates must be dated within the last 2 years in order to be valid.", "Medical", false),
        Q("If your load is over-length, over-width, and/or overweight, you should have a special transit permit, use flashing lights or signs, and:", ["A) Limit driving to certain times", "B) Block off the road on which you'll travel", "C) Refrain from using piggyback trailers", "D) Maintain 5 minutes space between yourself and the pilot vehicle"], "A", "If you have an oversized load, you should have a special transit permit, use special equipment (like flashing lights or 'wide load' signs), and limit your driving to certain times of the day.", "Cargo", false),
        Q("Which of the following should be considered as part of your pre-trip inspection?", ["A) The weight is properly balanced", "B) The cargo has a high center of gravity", "C) There are a maximum of 2 tie-downs", "D) There is little to no weight on the front axle"], "A", "When you inspect your cargo, you should make sure the weight is properly balanced with a low center of gravity, as well as sufficient weight on the front axle so that you get good traction.", "Vehicle Inspection", false),
        Q("If your load extends more than ______ beyond the rear of your vehicle, you must attach a solid red or fluorescent orange flag to the furthest point on the load.", ["A) 3 feet", "B) 4 feet", "C) 5 feet", "D) 6 feet"], "B", "A flag is required for any projecting load that extends more than 4 feet from the rear of the vehicle.", "Cargo", false),
        Q("______ is the number one reason why a vehicle inspection is required before each trip.", ["A) Safety", "B) Routine", "C) Maintenance", "D) Inventory"], "A", "The main reason for vehicle inspections is safety. Inspecting helps ensure the safety of you and the people around you on the road.", "Vehicle Inspection", false),
        Q("If your vehicle has a high center of gravity, you are more likely to experience:", ["A) Brake failure", "B) Fire", "C) Hydroplaning", "D) A rollover"], "D", "If your vehicle has a high center of gravity, you are more likely to experience a rollover if you turn too sharply.", "Weight Limits", false),
        Q("When you start the engine, the oil pressure gauge should show:", ["A) A warning light that does not turn off", "B) Immediately normal oil pressure", "C) Increasing or normal oil pressure", "D) Decreasing oil pressure"], "C", "Once you start the vehicle, your oil pressure gauge should show an increasing or normal oil pressure level. If the vehicle isn't equipped with this feature, a warning light should appear and go off quickly.", "Vehicle Inspection", false),
        Q("Downshifting is an effective strategy to slow speed on a downhill grade. You should downshift:", ["A) After starting the downhill", "B) When your vehicle surpasses your safe speed", "C) Before starting the downhill", "D) When your vehicle is 5 mph below your safe speed"], "C", "You should downshift before you start on a downhill grade.", "Mountain Driving", false),
        Q("On a wet road, you should slow your speed by about:", ["A) One-third", "B) One-half", "C) One-fourth", "D) One-fifth"], "A", "If the road is slippery, you should reduce your speed by about one-third.", "Speed Management", false),
        Q("When driving in winter, it's especially important to check your ______ to avoid a carbon monoxide leak in your vehicle.", ["A) Radiator shutters", "B) Wipers", "C) Heating equipment", "D) Exhaust system"], "D", "When driving in winter, cab ventilation is usually poor. This means checking for exhaust leaks is especially important, since carbon monoxide poison could lead to sleepiness and even death.", "Winter Driving", false),
        Q("Blocking is used ______ of cargo to keep it from sliding.", ["A) Only at the top", "B) Near the opening", "C) In the front, back, and sides", "D) From the upper part to the bottom"], "C", "Blocking is used at the front, back, and/or sides of the cargo to keep it from sliding around.", "Cargo", false),
        Q("If you apply your brakes too much, this can create excessive heat. This is referred to as:", ["A) Brake fade", "B) Brake dimming", "C) Brake collapse", "D) Brake decline"], "A", "When you use your brakes too much, instead of triggering the engine's braking effect, it creates a lot of heat on your brakes. This overheating can lead to brake fade or even brake failure.", "Brakes", true),
        Q("When checking for steering system defects, you should make sure there are no broken, loose, or bent parts, including the:", ["A) Steering column", "B) Air pressure", "C) Drums", "D) Multi-leaf springs"], "A", "It's important to check the steering column, steering gear box, and tie rods to make sure nothing is bent, loose, or broken during each pre-trip inspection.", "Vehicle Inspection", false),
        Q("Tank vehicles require extra care while driving because dangerous conditions can be caused by load surges, shifting liquids, and:", ["A) Their high center of gravity", "B) Flow through the baffled tanks", "C) Their need for quick stops", "D) Their excessive heights that don't fit below bridges"], "A", "Load surges, shifting liquids, and a high center of gravity all contribute to a tank vehicle's danger level. Take extra care when driving one.", "Tank Vehicles", false),
        Q("It's important to know the laws and regulations for driving a commercial motor vehicle (CMV) in your area because these policies:", ["A) Vary depending on location", "B) Are updated yearly", "C) Vary based on your travel distance", "D) Do not apply to all drivers"], "A", "It's important to know the rules for driving a commercial motor vehicle (CMV), loading and securing cargo, and where you're allowed to drive. However, be mindful that these laws and regulations can vary from place to place.", "Laws", false),
        Q("Perception distance, reaction distance, and braking distance, all add up your:", ["A) Speed of travel", "B) Following distance", "C) Stopping distance", "D) Response distance"], "C", "Your perception distance is the time it takes from when your eyes see a hazard until your brain recognizes it. The reaction distance is the time between recognizing the hazard and when you physically put your foot to the brake. Your braking distance is how long it takes from the time you start braking until your vehicle comes to a stop. All of these things add up to equal your total stopping distance.", "Stopping Distance", true),
        Q("If you double your speed from just 20 mph to 40 mph, your stopping distance will be ___ times longer.", ["A) 2", "B) 4", "C) 5", "D) 6"], "B", "Stopping distance is the space your vehicle travels over from the time your eyes recognize a hazard in the road until your vehicle stops. If you double your speed, you've increased your stopping distance by 4 times.", "Stopping Distance", true),
        Q("If you're driving in heavy rain, be careful of your brake use. Wet brakes can lead to:", ["A) Stab braking", "B) Excessive brake wear", "C) Misaligned rotors", "D) Jackknifing"], "D", "During heavy rain, it's very likely that your brakes will get wet. This is dangerous because it weakens your brakes or causes them to grab unevenly. This might cause loss of braking power, wheel lockups, pulling to the side, or even jackknifing a trailer.", "Braking", true),
        Q("You can tell what kind of hazardous materials are contained in a load by looking at the container's:", ["A) Color", "B) Placard", "C) Shape", "D) Tie-downs"], "B", "A placard will let you know what type of hazardous material is in any given cargo. 4 identical placards must be on the container, including one on the front, one on the back, and one on each side.", "Hazardous Materials", false),

    const configs = {
        general: { bank: generalBank, count: 50, name: "General Knowledge" },

        combo: { bank: comboBank, count: 20, name: "Combination Vehicles" },

    function shuffleSelect(bank, n) {
        let arr = [...bank];
        for (let i = arr.length - 1; i > 0; i--) {
            let j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr.slice(0, n);
    }

    let timerInterval = null, elapsed = 0, timerOn = false, testType = "general";
    let scoreHistory = [], topicStats = {};

    const testSelect = document.getElementById('testSelect');

    const clockSpan = document.getElementById('clockDisplay');
    const liveScoreSpan = document.getElementById('liveScore');
    const qCounterSpan = document.getElementById('qCounter');
    const bookmarkSpan = document.getElementById('bookmarkIcon');
    const qTextSpan = document.getElementById('qText');

    const scorePanel = document.getElementById('scorePanel');

    const downloadBtn = document.getElementById('downloadBtn');
    const reviewBadge = document.getElementById('reviewModeBadge');

    function formatTime(s) { return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }
    function updateClock() { if (timerOn && !completed) clockSpan.textContent = formatTime(elapsed); }
    function startTimer() { if (timerInterval) clearInterval(timerInterval); timerInterval = setInterval(() => { if (timerOn && !completed) { elapsed++; updateClock(); } }, 1000); }
    function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
    function resetTimer() { stopTimer(); elapsed = 0; updateClock(); if (timerOn && !completed) startTimer(); }

    function updateScore() {
        if (completed || reviewMode) return;
        let correct = 0, answered = 0;
        for (let i = 0; i <= idx; i++) {
            if (answers[i] !== null) { answered++; if (answers[i] === questions[i].correct) correct++; }
        }
        let pct = answered ? Math.round(correct/answered*100) : 0;
        let remaining = questions.length - answered;
        liveScoreSpan.innerHTML = `✅ ${correct} | ❌ ${answered-correct} | ${pct}% | ${remaining} left`;
    }

    function render() {
        if (completed || idx >= questions.length) { endTest(); return; }
        let q = questions[idx];
        let total = questions.length;
        let cfg = configs[testType];
        let priorityHtml = q.priority ? '<span class="priority">⚠️ High Priority</span>' : '';
        qCounterSpan.innerHTML = `${idx+1}/${total} | ${cfg.name} ${priorityHtml}`;
        bookmarkSpan.innerHTML = flagged.has(idx) ? "⭐ Flagged" : "☆";
        qTextSpan.innerHTML = q.text;
        optionsDiv.innerHTML = '';
        
        // Clear feedback when loading a new question
        feedbackDiv.style.display = 'none';
        feedbackDiv.className = 'feedback';
        feedbackDiv.innerHTML = '';
        
        q.options.forEach(opt => {
            let letter = opt[0];
            let div = document.createElement('div');
            div.className = 'option';
            if (answers[idx] === letter) div.classList.add('selected');
            let radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q';
            radio.value = letter;
            if (answers[idx] === letter) radio.checked = true;
            let span = document.createElement('span');
            span.className = 'option-text';
            span.innerText = opt;
            div.appendChild(radio);
            div.appendChild(span);
            div.onclick = (e) => { if (e.target.tagName !== 'INPUT' && !completed && answers[idx] === null) selectAnswer(letter); };
            optionsDiv.appendChild(div);
        });
        if (answers[idx] !== null) {
            diffRow.style.display = 'flex';
            let diff = difficulties[idx];
            document.querySelectorAll('.diff-btn').forEach(btn => {
                btn.classList.remove('selected');
                if ((diff === 'easy' && btn.dataset.diff === 'easy') ||
                    (diff === 'medium' && btn.dataset.diff === 'medium') ||
                    (diff === 'hard' && btn.dataset.diff === 'hard')) btn.classList.add('selected');
            });
        } else {
            diffRow.style.display = 'none';
        }
    }

    function selectAnswer(letter) {
        if (completed) return;
        let q = questions[idx];
        answers[idx] = letter;
        if (!reviewMode) origAnswers[idx] = letter;
        let isCorrect = (letter === q.correct);
        
        feedbackDiv.style.display = 'block';
        feedbackDiv.className = 'feedback';
        if (isCorrect) {
            feedbackDiv.classList.add('feedback-correct');
            feedbackDiv.innerHTML = `✅ CORRECT! ${q.explanation}`;
        } else {
            feedbackDiv.classList.add('feedback-wrong');
            let correctLetter = q.correct;
            let correctText = q.options.find(o => o[0] === correctLetter).substring(3);
            feedbackDiv.innerHTML = `❌ WRONG. Correct: ${correctLetter} — ${correctText}<br>📘 ${q.explanation}`;
        }
        diffRow.style.display = 'flex';
        updateScore();
        document.querySelectorAll('.option').forEach(opt => {
            opt.classList.remove('selected');
            if (opt.querySelector('input') && opt.querySelector('input').value === letter) {
                opt.classList.add('selected');
            }
        });
    }

    function next() {
        if (completed) return;
        if (answers[idx] === null && !reviewMode) { alert("Please answer before continuing."); return; }
        if (idx + 1 < questions.length) { idx++; render(); }
        else endTest();
    }

    function flag() { if (completed) return; if (flagged.has(idx)) flagged.delete(idx); else flagged.add(idx); bookmarkSpan.innerHTML = flagged.has(idx) ? "⭐ Flagged" : "☆"; }

    function loadTest() {
        stopTimer();
        let selected = testSelect.value;
        testType = selected;
        reviewMode = false;
        reviewBadge.style.display = 'none';
        let cfg = configs[selected];
        questions = shuffleSelect(cfg.bank, cfg.count);
        origQuestions = [...questions];
        idx = 0;
        answers = new Array(questions.length).fill(null);
        origAnswers = [...answers];
        difficulties = new Array(questions.length).fill(null);
        flagged.clear();
        completed = false;
        scorePanel.style.display = 'none';
        elapsed = 0;
        updateClock();
        if (timerOn) startTimer();
        updateScore();
        render();
    }

    function endTest() {
        stopTimer();
        completed = true;
        let total = questions.length;
        let score = 0;
        for (let i = 0; i < total; i++) if (answers[i] === questions[i].correct) score++;
        let pct = Math.round(score/total*100);
        if (!reviewMode) {
            scoreHistory.unshift({ date: new Date(), score, total, pct });
            if (scoreHistory.length > 5) scoreHistory.pop();
            topicStats = {};
            for (let i = 0; i < origQuestions.length; i++) {
                let t = origQuestions[i].topic;
                if (!topicStats[t]) topicStats[t] = { total: 0, correct: 0 };
                topicStats[t].total++;
                if (origAnswers[i] === origQuestions[i].correct) topicStats[t].correct++;
            }
        }
        finalScoreSpan.innerText = `${score} / ${total} (${pct}%)`;
        passMsgSpan.innerHTML = pct >= 80 ? '✅ PASSING! Ready for the official exam.' : '❌ Below 80%. Keep practicing!';
        let statsHtml = `<div class="stat-card"><strong>📊 Last 5</strong><br>`;
        scoreHistory.slice(0,5).forEach(s => statsHtml += `${s.score}/${s.total} (${s.pct}%)<br>`);
        statsHtml += `</div><div class="stat-card"><strong>📚 Topics</strong><div class="topic-list">`;
        let sorted = Object.entries(topicStats).sort((a,b) => (a[1].correct/a[1].total) - (b[1].correct/b[1].total));
        sorted.forEach(([t, st]) => {
            let tpct = Math.round(st.correct/st.total*100);
            statsHtml += `<div class="topic-item"><span>${t}</span><span style="color:${tpct>=80?'#2ecc71':tpct>=60?'#d4a017':'#e74c3c'}">${st.correct}/${st.total} (${tpct}%)</span></div>`;
        });
        statsHtml += `</div></div>`;
        statsPanelDiv.innerHTML = statsHtml;
        let missed = total - score;
        if (!reviewMode) {
            reviewMissedBtn.style.display = missed ? 'inline-block' : 'inline-block';
            reviewMissedBtn.innerText = missed ? `📝 Review Missed (${missed})` : '🎉 Perfect Score!';
            reviewFlaggedBtn.style.display = flagged.size ? 'inline-block' : 'none';
            if (flagged.size) reviewFlaggedBtn.innerText = `⭐ Review Flagged (${flagged.size})`;
        }
        scorePanel.style.display = 'block';
        optionsDiv.innerHTML = '<div style="padding:20px;text-align:center;">🏁 Test completed. Choose an option below.</div>';
        qCounterSpan.innerHTML = `Finished | Score: ${score}/${total}`;
        feedbackDiv.style.display = 'none';
        diffRow.style.display = 'none';
        liveScoreSpan.innerHTML = `✅ ${score} | ❌ ${total-score} | ${pct}% | Complete`;
    }

    function restart() { stopTimer(); flagged.clear(); loadTest(); }
    function newTest() { restart(); }

    function reviewMissed() {
        stopTimer();
        let missed = [];
        for (let i = 0; i < origQuestions.length; i++) if (origAnswers[i] !== origQuestions[i].correct) missed.push(origQuestions[i]);
        if (!missed.length) { alert("No missed questions!"); if (timerOn) startTimer(); return; }
        questions = missed;
        idx = 0;
        answers = new Array(questions.length).fill(null);
        difficulties = new Array(questions.length).fill(null);
        flagged.clear();
        completed = false;
        reviewMode = true;
        reviewBadge.style.display = 'inline-block';
        reviewBadge.innerHTML = `📝 REVIEW MODE: ${questions.length} missed questions`;
        scorePanel.style.display = 'none';
        elapsed = 0;
        updateClock();
        if (timerOn) startTimer();
        updateScore();
        render();
    }

    function reviewFlagged() {
        stopTimer();
        if (!flagged.size) { alert("No flagged questions!"); if (timerOn) startTimer(); return; }
        let flaggedList = [];
        for (let i = 0; i < origQuestions.length; i++) if (flagged.has(i)) flaggedList.push(origQuestions[i]);
        questions = flaggedList;
        idx = 0;
        answers = new Array(questions.length).fill(null);
        difficulties = new Array(questions.length).fill(null);
        flagged.clear();
        completed = false;
        reviewMode = true;
        reviewBadge.style.display = 'inline-block';
        reviewBadge.innerHTML = `⭐ REVIEW MODE: ${questions.length} flagged questions`;
        scorePanel.style.display = 'none';
        elapsed = 0;
        updateClock();
        if (timerOn) startTimer();
        updateScore();
        render();
    }

    function downloadMissed() {
        let missed = [];
        for (let i = 0; i < origQuestions.length; i++) {
            if (origAnswers[i] !== origQuestions[i].correct) {
                missed.push({
                    q: origQuestions[i].text,
                    correct: origQuestions[i].options.find(o => o[0] === origQuestions[i].correct).substring(3),
                    explanation: origQuestions[i].explanation,
                    topic: origQuestions[i].topic,
                    priority: origQuestions[i].priority
                });
            }
        }
        if (!missed.length) { alert("No missed questions!"); return; }
        let content = `IL CDL Missed Questions - ${new Date().toLocaleString()}\n${'='.repeat(50)}\n\n`;
        missed.forEach((m, i) => {
            content += `Q${i+1} [${m.topic}]${m.priority ? ' ⚠️ HIGH PRIORITY' : ''}\n`;
            content += `Question: ${m.q}\n`;
            content += `Correct Answer: ${m.correct}\n`;
            content += `Explanation: ${m.explanation}\n${'-'.repeat(40)}\n\n`;
        });
        let blob = new Blob([content], { type: 'text/plain' });
        let a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `cdl_missed_${Date.now()}.txt`;
        a.click();
        URL.revokeObjectURL(a.href);
    }

    document.querySelectorAll('.diff-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            if (completed) return;
            let diff = btn.dataset.diff;
            difficulties[idx] = diff;
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        });
    });

    timerToggle.addEventListener('change', (e) => {
        timerOn = e.target.checked;
        clockSpan.style.display = timerOn ? 'inline-block' : 'none';
        if (timerOn && !completed) { resetTimer(); startTimer(); }
        else if (!timerOn) stopTimer();
    });
    clockSpan.style.display = 'none';

    testSelect.addEventListener('change', restart);
    nextBtn.addEventListener('click', next);
    flagBtn.addEventListener('click', flag);
    restartBtn.addEventListener('click', restart);
    newTestBtn.addEventListener('click', newTest);
    reviewMissedBtn.addEventListener('click', reviewMissed);
    reviewFlaggedBtn.addEventListener('click', reviewFlagged);
    downloadBtn.addEventListener('click', downloadMissed);
    loadTest();
</script>
</body>
</html>
