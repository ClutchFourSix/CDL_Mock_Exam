<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>IL CDL Practice v3.2 | Full Feedback | #FFFFE7 Cream</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            color: #eef2ff;
            transition: background 0.4s ease, color 0.3s ease;
        }

        body.dark {
            background: radial-gradient(circle at 50% 50%, #000000 0%, #0a1628 40%, #0f1f3a 65%, #162a4a 85%, #1a3055 100%);
        }

        body.light {
            background: radial-gradient(circle at 50% 50%, #f5efe6 0%, #f0eadc 25%, #ebe4d2 50%, #e6dfc8 75%, #FFFFE7 100%);
            color: #0d0d0a;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
            border-radius: 32px;
            overflow: hidden;
            padding: 20px 18px 32px;
            transition: background 0.4s ease, border 0.3s ease, box-shadow 0.4s ease;
        }

        body.dark .container {
            background: rgba(15, 22, 32, 0.92);
            border: 1px solid rgba(255, 180, 71, 0.15);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
        }

        body.light .container {
            background: #FFFFE7;
            border: 1px solid rgba(180, 150, 110, 0.35);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.12);
        }

        h1 {
            font-size: 1.6rem;
            margin: 0 0 4px 0;
            background: linear-gradient(135deg, #ffb347 0%, #ff8c00 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .version-tag {
            font-size: 0.7rem;
            opacity: 0.6;
            font-weight: normal;
            background: rgba(255, 180, 71, 0.15);
            padding: 2px 10px;
            border-radius: 20px;
            display: inline-block;
            margin-left: 8px;
        }

        body.light .version-tag {
            background: rgba(180, 150, 110, 0.15);
        }

        .sub {
            color: #8ba0bc;
            font-size: 0.75rem;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 180, 71, 0.15);
            transition: color 0.3s, border-color 0.3s;
        }

        body.light .sub {
            color: #4a3f30;
            border-bottom: 1px solid rgba(180, 150, 110, 0.3);
        }

        .top-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 20px;
            padding: 10px 16px;
            border-radius: 60px;
            transition: background 0.4s, border 0.3s;
        }

        body.dark .top-bar {
            background: rgba(10, 16, 25, 0.8);
            border: 1px solid rgba(255, 180, 71, 0.15);
        }

        body.light .top-bar {
            background: #FFFFE7;
            border: 1px solid rgba(180, 150, 110, 0.25);
        }

        .clock {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.3rem;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 40px;
            letter-spacing: 1px;
            transition: background 0.3s, border 0.3s, color 0.3s;
        }

        body.dark .clock {
            background: #0a1019;
            border: 1px solid #2a3a4a;
            color: #ffb347;
        }

        body.light .clock {
            background: #FFFFE7;
            border: 1px solid #c4b8a4;
            color: #b87a2a;
        }

        .toggle-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            padding: 6px 14px;
            border-radius: 40px;
            transition: background 0.3s, border 0.3s;
        }

        body.dark .toggle-label {
            background: #0a1019;
            border: 1px solid #2a3a4a;
            color: #eef2ff;
        }

        body.light .toggle-label {
            background: #FFFFE7;
            border: 1px solid #c4b8a4;
            color: #0d0d0a;
        }

        .toggle-label input {
            width: 44px;
            height: 24px;
            appearance: none;
            background: #2a3a4a;
            border-radius: 24px;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }

        .toggle-label input:checked {
            background: #ffb347;
        }

        .toggle-label input::before {
            content: '';
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 3px;
            left: 4px;
            transition: 0.2s;
        }

        .toggle-label input:checked::before {
            left: 22px;
        }

        .score-badge {
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid #2a3a4a;
            letter-spacing: 0.3px;
            transition: background 0.3s, border 0.3s;
        }

        body.dark .score-badge {
            background: #0a1019;
            color: #eef2ff;
        }

        body.light .score-badge {
            background: #FFFFE7;
            border: 1px solid #c4b8a4;
            color: #0d0d0a;
        }

        .test-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 24px;
            padding: 8px 12px;
            border-radius: 60px;
            transition: background 0.4s, border 0.3s;
        }

        body.dark .test-bar {
            background: rgba(10, 16, 25, 0.6);
            border: 1px solid rgba(255, 180, 71, 0.15);
        }

        body.light .test-bar {
            background: #FFFFE7;
            border: 1px solid rgba(180, 150, 110, 0.25);
        }

        select {
            font-size: 0.85rem;
            padding: 10px 16px;
            border-radius: 60px;
            font-weight: 500;
            flex: 1;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid;
            -webkit-appearance: none;
            appearance: none;
        }

        select:focus {
            outline: none;
            border-color: #ffb347;
        }

        body.dark select {
            background: #0a1019;
            color: #f0f4fa;
            border-color: #3a4a5f;
        }

        body.light select {
            background: #FFFFE7;
            color: #0d0d0a;
            border: 1px solid #c4b8a4;
        }

        .download-btn {
            font-weight: 600;
            padding: 10px 18px;
            border-radius: 60px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid;
        }

        body.dark .download-btn {
            background: linear-gradient(145deg, #3a2a2a, #2a1a1a);
            border-color: rgba(255, 100, 100, 0.25);
            color: white;
        }

        body.light .download-btn {
            background: #d4c4b0;
            border-color: rgba(150, 100, 70, 0.3);
            color: #0d0d0a;
        }

        .download-btn:active { transform: scale(0.96); }

        .review-mode {
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            display: inline-block;
            margin-bottom: 16px;
            border-left: 3px solid #ffb347;
            transition: background 0.3s;
        }

        body.dark .review-mode {
            background: linear-gradient(145deg, #2a3a4a, #1a2a3a);
            color: #eef2ff;
        }

        body.light .review-mode {
            background: #e0d5c5;
            color: #0d0d0a;
        }

        .question-box {
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            transition: background 0.4s, border 0.3s, box-shadow 0.4s;
        }

        body.dark .question-box {
            background: linear-gradient(145deg, #0f1620, #0a1019);
            border: 1px solid rgba(255, 180, 71, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        body.light .question-box {
            background: #FFFFE7;
            border: 1px solid rgba(180, 150, 110, 0.3);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .q-header {
            font-size: 0.75rem;
            color: #ffb347;
            margin-bottom: 18px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            letter-spacing: 0.3px;
            transition: color 0.3s;
        }

        body.light .q-header {
            color: #8a6a3a;
        }

        .priority {
            background: linear-gradient(145deg, #c72a2a, #9a1a1a);
            color: white;
            font-size: 0.6rem;
            padding: 3px 10px;
            border-radius: 30px;
            margin-left: 8px;
            font-weight: 600;
        }

        .q-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 24px;
            line-height: 1.45;
            color: #ffffff;
            transition: color 0.3s;
        }

        body.light .q-text {
            color: #0d0d0a;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .option {
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            padding: 12px 16px;
            border-radius: 24px;
            transition: all 0.15s;
        }

        body.dark .option {
            background: #0a1019;
            border: 1px solid #2a3645;
        }

        body.light .option {
            background: #FFFFE7;
            border: 1px solid #c4b8a4;
        }

        .option:hover {
            background: #1a2535;
            border-color: #ffb34780;
            transform: translateX(2px);
        }

        body.light .option:hover {
            background: #e0d5c5;
            border-color: #b87a2a80;
        }

        .option.selected {
            border-color: #ffb347;
            box-shadow: 0 2px 8px rgba(255, 180, 71, 0.2);
        }

        body.dark .option.selected {
            background: linear-gradient(145deg, #1f6392, #154a6e);
        }

        body.light .option.selected {
            background: linear-gradient(145deg, #c4a880, #b0906a);
            border-color: #8a6a3a;
            box-shadow: 0 2px 8px rgba(180, 150, 110, 0.25);
        }

        .option input {
            width: 18px;
            height: 18px;
            margin: 0;
            accent-color: #ffb347;
            pointer-events: none;
        }

        .option-text {
            font-size: 0.9rem;
            color: #d6e3f0;
            flex: 1;
            font-weight: 450;
            transition: color 0.3s;
        }

        body.light .option-text {
            color: #0d0d0a;
        }

        .difficulty-row {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 180, 71, 0.12);
        }

        body.light .difficulty-row {
            border-top: 1px solid rgba(180, 150, 110, 0.2);
        }

        .diff-btn {
            background: #1a2535;
            border: none;
            color: #c0d0e0;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.15s;
            font-weight: 500;
        }

        body.light .diff-btn {
            background: #d0c4b0;
            color: #0d0d0a;
        }

        .diff-easy.selected { background: #2c6e2c; color: white; }
        .diff-medium.selected { background: #d4a017; color: white; }
        .diff-hard.selected { background: #c72a2a; color: white; }

        .feedback {
            margin-top: 18px;
            padding: 14px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            line-height: 1.5;
            border-left: 5px solid;
            display: none;
        }

        .feedback-correct {
            display: block;
        }

        body.dark .feedback-correct {
            background: rgba(46, 204, 113, 0.12);
            border-left-color: #2ecc71;
            color: #b0f0cf;
        }

        body.light .feedback-correct {
            background: rgba(46, 204, 113, 0.15);
            border-left-color: #2ecc71;
            color: #1a5a3a;
        }

        .feedback-wrong {
            display: block;
        }

        body.dark .feedback-wrong {
            background: rgba(231, 76, 60, 0.12);
            border-left-color: #e74c3c;
            color: #f5bcbc;
        }

        body.light .feedback-wrong {
            background: rgba(231, 76, 60, 0.15);
            border-left-color: #e74c3c;
            color: #8a2a1a;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin: 20px 0 24px;
        }

        .action-buttons button {
            flex: 1;
            background: linear-gradient(145deg, #1f6392, #154a6e);
            border: none;
            color: white;
            font-weight: 600;
            padding: 14px 8px;
            border-radius: 60px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }

        .action-buttons button:active { transform: scale(0.97); }

        body.light .action-buttons button {
            background: linear-gradient(145deg, #c4a880, #b0906a);
            color: #0d0d0a;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        }

        .flag-btn { background: linear-gradient(145deg, #6a4e2a, #4a2e1a) !important; }
        body.light .flag-btn { background: #a0886a !important; color: #0d0d0a !important; }
        .restart-btn { background: linear-gradient(145deg, #3a4c62, #2a3a4a) !important; }
        body.light .restart-btn { background: #b0a090 !important; color: #0d0d0a !important; }

        .score-panel {
            padding: 18px;
            border-radius: 28px;
            text-align: center;
            margin-top: 20px;
            transition: background 0.4s, border 0.3s;
        }

        body.dark .score-panel {
            background: linear-gradient(145deg, #0a111f, #050a14);
            border: 1px solid rgba(255, 180, 71, 0.2);
        }

        body.light .score-panel {
            background: #FFFFE7;
            border: 1px solid rgba(180, 150, 110, 0.3);
        }

        .score-number {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffb347, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
            text-align: left;
            font-size: 0.7rem;
        }

        .stat-card {
            background: rgba(10, 16, 25, 0.7);
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #2a3a4a;
            transition: background 0.3s, border 0.3s;
        }

        body.light .stat-card {
            background: rgba(240, 235, 225, 0.7);
            border: 1px solid #c4b8a4;
            color: #0d0d0a;
        }

        .topic-list {
            max-height: 150px;
            overflow-y: auto;
            margin-top: 8px;
        }

        .topic-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #2a3440;
            font-size: 0.7rem;
        }

        body.light .topic-item {
            border-bottom: 1px solid #d0c4b0;
            color: #0d0d0a;
        }

        footer {
            font-size: 0.6rem;
            text-align: center;
            margin-top: 24px;
            color: #5f7f9e;
            opacity: 0.7;
            transition: color 0.3s;
        }

        body.light footer {
            color: #4a3f30;
        }

        button { cursor: pointer; }

        .theme-toggle-btn {
            background: none;
            border: 1px solid #2a3a4a;
            color: #ffb347;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }

        .theme-toggle-btn:hover {
            background: rgba(255, 180, 71, 0.1);
            border-color: #ffb347;
        }

        body.light .theme-toggle-btn {
            border: 1px solid #c4b8a4;
            color: #8a6a3a;
        }

        body.light .theme-toggle-btn:hover {
            background: rgba(180, 150, 110, 0.15);
            border-color: #8a6a3a;
        }

        @media (max-width: 550px) {
            body { padding: 12px; }
            .container { padding: 14px; }
            .q-text { font-size: 1rem; }
            .option-text { font-size: 0.85rem; }
            .action-buttons button { padding: 12px 6px; font-size: 0.8rem; }
            .top-bar { flex-wrap: wrap; justify-content: center; }
            .theme-toggle-btn { font-size: 0.7rem; padding: 4px 10px; }
            .version-tag { font-size: 0.6rem; margin-left: 4px; }
        }
    </style>
</head>
<body class="dark">
<div class="container" id="appContainer">
    <h1>IL CDL Practice <span class="version-tag">v3.2</span></h1>
    <div class="sub">High Priority in red • Timer off by default • Tap anywhere on answer</div>

    <div class="top-bar">
        <div class="clock" id="clockDisplay" style="display:none;">00:00</div>
        <label class="toggle-label">
            <input type="checkbox" id="timerToggle">
            <span>Show Timer</span>
        </label>
        <div class="score-badge" id="liveScore">✅ 0 | ❌ 0 | 0% | 50 left</div>
        <button class="theme-toggle-btn" id="themeToggleBtn">🌓 Theme</button>
    </div>

    <div class="test-bar">
        <select id="testSelect">
            <option value="general">🚚 General Knowledge (50 Q)</option>
            <option value="air">🛑 Air Brakes (25 Q)</option>
            <option value="combo">🔗 Combination Vehicles (20 Q)</option>
            <option value="pretrip">🔧 Pre-Trip Inspection (20 Q)</option>
        </select>
        <button class="download-btn" id="downloadBtn">📥 Download Missed</button>
    </div>

    <div id="reviewModeBadge" class="review-mode" style="display:none;"></div>

    <div class="question-box">
        <div class="q-header">
            <span id="qCounter">Question 1 / 50</span>
            <span id="bookmarkIcon" style="color:#ffb347; cursor:pointer;">☆</span>
        </div>
        <div class="q-text" id="qText">Loading questions...</div>
        <div class="options" id="optionsContainer"></div>
        <div class="difficulty-row" id="difficultyRow" style="display:none;">
            <button class="diff-btn diff-easy" data-diff="easy">🟢 Easy</button>
            <button class="diff-btn diff-medium" data-diff="medium">🟡 Medium</button>
            <button class="diff-btn diff-hard" data-diff="hard">🔴 Hard</button>
        </div>
        <div id="feedback" class="feedback"></div>
    </div>

    <div class="action-buttons">
        <button id="nextBtn">➡ Next</button>
        <button id="flagBtn" class="flag-btn">⭐ Flag</button>
        <button id="restartBtn" class="restart-btn">🔄 Restart</button>
    </div>

    <div id="scorePanel" class="score-panel" style="display:none;">
        <div>🏆 Test Completed</div>
        <div class="score-number" id="finalScore">0 / 0</div>
        <div id="passMsg"></div>
        <div class="stats-grid" id="statsPanel"></div>
        <div style="display:flex; gap:12px; margin-top:16px; flex-wrap:wrap;">
            <button id="reviewMissedBtn" style="background:#6a4e2a; border:none; padding:10px 16px; border-radius:40px; font-weight:600;">📝 Review Missed</button>
            <button id="reviewFlaggedBtn" style="background:#4a3a2a; border:none; padding:10px 16px; border-radius:40px; font-weight:600;">⭐ Review Flagged</button>
            <button id="newTestBtn" style="background:#3a4c62; border:none; padding:10px 16px; border-radius:40px; font-weight:600;">⟳ New Test</button>
        </div>
    </div>
    <footer>Timer is OFF by default (like the real test). Toggle ON to track your pace.</footer>
</div>

<script>
    // ==============================================================
    // THEME TOGGLE
    // ==============================================================
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    let isDark = true;

    function toggleTheme() {
        isDark = !isDark;
        if (isDark) {
            document.body.classList.remove('light');
            document.body.classList.add('dark');
            themeToggleBtn.textContent = '🌓 Theme';
        } else {
            document.body.classList.remove('dark');
            document.body.classList.add('light');
            themeToggleBtn.textContent = '🌙 Dark';
        }
    }
    themeToggleBtn.addEventListener('click', toggleTheme);

    // ==============================================================
    // QUESTION BANKS - All unique, correctly categorized
    // ==============================================================
    
    function Q(text, options, correct, explanation, topic, priority = false) {
        return { text, options, correct, explanation, topic, priority };
    }

    // ==============================================================
    // GENERAL KNOWLEDGE BANK - All questions (originals + new)
    // ==============================================================
    const generalBank = [
        // === ORIGINAL QUESTIONS (75) ===
        Q("What is the correct following distance formula for a commercial vehicle?", ["A) 1 second for every 20 feet", "B) 1 second for every 10 feet + 1 sec over 40 mph", "C) 2 seconds regardless", "D) 1 car length per 10 mph"], "B", "1 second per 10 feet of vehicle length, plus 1 additional second for speeds over 40 mph.", "Following Distance", true),
        Q("What three factors add up to total stopping distance?", ["A) Perception + Reaction + Braking", "B) Speed + Weight + Road", "C) Brake lag + Reaction", "D) Reaction + Skid"], "A", "Perception distance + reaction distance + braking distance = total stopping distance.", "Stopping Distance", true),
        Q("How do you recover from a rear-wheel braking skid?", ["A) Steer away and accelerate", "B) Stop braking, push clutch, steer into skid", "C) Apply more brake", "D) Use trailer hand brake"], "B", "Release brakes, push clutch, and countersteer in direction of skid.", "Skid Control", true),
        Q("What action stops hydroplaning?", ["A) Brake firmly", "B) Release accelerator, push clutch", "C) Turn sharply", "D) Speed up"], "B", "Release accelerator and push clutch to let wheels turn freely.", "Hydroplaning", true),
        Q("What BAC triggers 24-hour out-of-service for a CDL holder?", ["A) 0.04%", "B) 0.08%", "C) Any detectable amount", "D) 0.02%"], "C", "Any detectable alcohol while operating a CMV results in 24-hour out-of-service.", "Alcohol Rules", true),
        Q("What must a driver do at a passive railroad crossing?", ["A) Stop only if gates down", "B) Slow, look, listen, be prepared to stop", "C) Speed up", "D) Stop at all crossings"], "B", "Slow down, look and listen for trains. Be prepared to stop.", "Railroad Crossings", true),
        Q("First action if your vehicle stalls on railroad tracks?", ["A) Call 911", "B) Try to restart", "C) Get everyone out and away from tracks", "D) Wave at train"], "C", "Get everyone out and move away from tracks at a 45° angle toward the approaching train.", "Railroad Crossings", true),
