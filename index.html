<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>IL CDL Practice | Fully Fixed for Firefox & Safari</title>
    <style>
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        /* ===== DARK THEME (default) ===== */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(circle at 50% 50%, #000000 0%, #0a1628 40%, #0f1f3a 65%, #162a4a 85%, #1a3055 100%);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            color: #eef2ff;
            transition: background 0.4s ease, color 0.3s ease;
        }
        body.light {
            background: radial-gradient(circle at 50% 50%, #f5efe6 0%, #f0eadc 25%, #ebe4d2 50%, #e6dfc8 75%, #FFFFE7 100%);
            color: #0a0a08;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
            background: rgba(15, 22, 32, 0.92);
            backdrop-filter: blur(0px);
            border-radius: 32px;
            overflow: hidden;
            padding: 20px 18px 32px;
            border: 1px solid rgba(255, 180, 71, 0.15);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            transition: background 0.4s ease, border 0.3s ease, box-shadow 0.4s ease;
        }
        body.light .container {
            background: #FFFFE7;
            border: 1px solid rgba(180, 150, 110, 0.35);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 1.6rem;
            margin: 0 0 4px 0;
            background: linear-gradient(135deg, #ffb347 0%, #ff8c00 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .sub {
            color: #8ba0bc;
            font-size: 0.75rem;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255, 180, 71, 0.15);
            transition: color 0.3s, border-color 0.3s;
        }
        body.light .sub {
            color: #0a0a08;
            border-bottom: 1px solid rgba(180, 150, 110, 0.3);
        }
        /* Top bar */
        .top-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 20px;
            background: rgba(10, 16, 25, 0.8);
            padding: 10px 16px;
            border-radius: 60px;
            border: 1px solid rgba(255, 180, 71, 0.15);
            transition: background 0.4s, border 0.3s;
        }
        body.light .top-bar {
            background: #FFFFE7;
            border: 1px solid rgba(180, 150, 110, 0.25);
        }
        .clock {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.3rem;
            font-weight: 600;
            background: #0a1019;
            padding: 6px 16px;
            border-radius: 40px;
            color: #ffb347;
            letter-spacing: 1px;
            border: 1px solid #2a3a4a;
            transition: background 0.3s, border 0.3s, color 0.3s;
        }
        body.light .clock {
            background: #FFFFE7;
            border: 1px solid #c4b8a4;
            color: #b87a2a;
        }
        .toggle-label {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            background: #0a1019;
            padding: 6px 14px;
            border-radius: 40px;
            border: 1px solid #2a3a4a;
            transition: background 0.3s, border 0.3s;
        }
        body.light .toggle-label {
            background: #FFFFE7;
            border: 1px solid #c4b8a4;
            color: #0a0a08;
        }
        .toggle-label input {
            width: 44px;
            height: 24px;
            appearance: none;
            background: #2a3a4a;
            border-radius: 24px;
            position: relative;
            cursor: pointer;
            transition: 0.2s;
        }
        .toggle-label input:checked {
            background: #ffb347;
        }
        .toggle-label input::before {
            content: '';
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 3px;
            left: 4px;
            transition: 0.2s;
        }
        .toggle-label input:checked::before {
            left: 22px;
        }
        .score-badge {
            background: #0a1019;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 600;
            border: 1px solid #2a3a4a;
            letter-spacing: 0.3px;
            transition: background 0.3s, border 0.3s;
        }
        body.light .score-badge {
            background: #FFFFE7;
            border: 1px solid #c4b8a4;
            color: #0a0a08;
        }
        /* Test selector bar */
        .test-bar {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 24px;
            background: rgba(10, 16, 25, 0.6);
            padding: 8px 12px;
            border-radius: 60px;
            border: 1px solid rgba(255, 180, 71, 0.15);
            transition: background 0.4s, border 0.3s;
        }
        body.light .test-bar {
            background: #FFFFE7;
            border: 1px solid rgba(180, 150, 110, 0.25);
        }
        select {
            background: #0a1019;
            color: #f0f4fa;
            font-size: 0.85rem;
            padding: 10px 16px;
            border-radius: 60px;
            border: 1px solid #3a4a5f;
            font-weight: 500;
            flex: 1;
            cursor: pointer;
            transition: all 0.2s;
        }
        select:focus {
            outline: none;
            border-color: #ffb347;
        }
        body.light select {
            background: #FFFFE7;
            color: #0a0a08;
            border: 1px solid #c4b8a4;
        }
        .download-btn {
            background: linear-gradient(145deg, #3a2a2a, #2a1a1a);
            border: 1px solid rgba(255, 100, 100, 0.25);
            color: white;
            font-weight: 600;
            padding: 10px 18px;
            border-radius: 60px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .download-btn:active { transform: scale(0.96); }
        body.light .download-btn {
            background: linear-gradient(145deg, #d4c4b0, #c4b4a0);
            border: 1px solid rgba(150, 100, 70, 0.3);
            color: #0a0a08;
        }
        .review-mode {
            background: linear-gradient(145deg, #2a3a4a, #1a2a3a);
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            font-weight: 500;
            display: inline-block;
            margin-bottom: 16px;
            border-left: 3px solid #ffb347;
            transition: background 0.3s;
        }
        body.light .review-mode {
            background: #e0d5c5;
            color: #0a0a08;
        }
        /* Question card */
        .question-box {
            background: linear-gradient(145deg, #0f1620, #0a1019);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 180, 71, 0.2);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: background 0.4s, border 0.3s, box-shadow 0.4s;
        }
        body.light .question-box {
            background: #FFFFE7;
            border: 1px solid rgba(180, 150, 110, 0.3);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }
        .q-header {
            font-size: 0.75rem;
            color: #ffb347;
            margin-bottom: 18px;
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 8px;
            letter-spacing: 0.3px;
            transition: color 0.3s;
        }
        body.light .q-header {
            color: #3a1a0a;
        }
        .priority {
            background: linear-gradient(145deg, #c72a2a, #9a1a1a);
            color: white;
            font-size: 0.6rem;
            padding: 3px 10px;
            border-radius: 30px;
            margin-left: 8px;
            font-weight: 600;
        }
        .q-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 24px;
            line-height: 1.45;
            color: #ffffff;
            transition: color 0.3s;
        }
        body.light .q-text {
            color: #0a0a08;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            padding: 12px 16px;
            border-radius: 24px;
            background: #0a1019;
            border: 1px solid #2a3645;
            transition: all 0.15s;
        }
        body.light .option {
            background: #FFFFE7;
            border: 1px solid #c4b8a4;
        }
        .option:hover {
            background: #1a2535;
            border-color: #ffb34780;
            transform: translateX(2px);
        }
        body.light .option:hover {
            background: #e0d5c5;
            border-color: #b87a2a80;
        }
        .option.selected {
            background: linear-gradient(145deg, #1f6392, #154a6e);
            border-color: #ffb347;
            box-shadow: 0 2px 8px rgba(255, 180, 71, 0.2);
        }
        body.light .option.selected {
            background: linear-gradient(145deg, #c4a880, #b0906a);
            border-color: #8a6a3a;
            box-shadow: 0 2px 8px rgba(180, 150, 110, 0.25);
        }
        .option input {
            width: 18px;
            height: 18px;
            margin: 0;
            accent-color: #ffb347;
            pointer-events: none;
        }
        .option-text {
            font-size: 0.9rem;
            color: #d6e3f0;
            flex: 1;
            font-weight: 450;
            transition: color 0.3s;
        }
        body.light .option-text {
            color: #0a0a08;
        }
        .difficulty-row {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 180, 71, 0.12);
        }
        body.light .difficulty-row {
            border-top: 1px solid rgba(180, 150, 110, 0.2);
        }
        .diff-btn {
            background: #1a2535;
            border: none;
            color: #c0d0e0;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.15s;
            font-weight: 500;
        }
        body.light .diff-btn {
            background: #d0c4b0;
            color: #0a0a08;
        }
        .diff-easy.selected { background: #2c6e2c; color: white; }
        .diff-medium.selected { background: #d4a017; color: white; }
        .diff-hard.selected { background: #c72a2a; color: white; }
        .feedback {
            margin-top: 18px;
            padding: 14px;
            border-radius: 20px;
            font-size: 0.8rem;
            display: none;
            line-height: 1.4;
        }
        .feedback-correct {
            background: rgba(46, 204, 113, 0.12);
            border-left: 4px solid #2ecc71;
            color: #b0f0cf;
        }
        body.light .feedback-correct {
            background: rgba(46, 204, 113, 0.15);
            color: #0a2a0a;
        }
        .feedback-wrong {
            background: rgba(231, 76, 60, 0.12);
            border-left: 4px solid #e74c3c;
            color: #f5bcbc;
        }
        body.light .feedback-wrong {
            background: rgba(231, 76, 60, 0.15);
            color: #3a0a0a;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            margin: 20px 0 24px;
        }
        .action-buttons button {
            flex: 1;
            background: linear-gradient(145deg, #1f6392, #154a6e);
            border: none;
            color: white;
            font-weight: 600;
            padding: 14px 8px;
            border-radius: 60px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.3);
        }
        .action-buttons button:active { transform: scale(0.97); }
        body.light .action-buttons button {
            background: linear-gradient(145deg, #c4a880, #b0906a);
            color: #0a0a08;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        }
        .flag-btn { background: linear-gradient(145deg, #6a4e2a, #4a2e1a) !important; }
        body.light .flag-btn { background: linear-gradient(145deg, #a0886a, #807050) !important; color: #0a0a08 !important; }
        .restart-btn { background: linear-gradient(145deg, #3a4c62, #2a3a4a) !important; }
        body.light .restart-btn { background: linear-gradient(145deg, #b0a090, #9a8a7a) !important; color: #0a0a08 !important; }
        .score-panel {
            background: linear-gradient(145deg, #0a111f, #050a14);
            padding: 18px;
            border-radius: 28px;
            text-align: center;
            margin-top: 20px;
            border: 1px solid rgba(255, 180, 71, 0.2);
            transition: background 0.4s, border 0.3s;
        }
        body.light .score-panel {
            background: #FFFFE7;
            border: 1px solid rgba(180, 150, 110, 0.3);
        }
        .score-number {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #ffb347, #ff8c00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
            text-align: left;
            font-size: 0.7rem;
        }
        .stat-card {
            background: rgba(10, 16, 25, 0.7);
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #2a3a4a;
            transition: background 0.3s, border 0.3s;
        }
        body.light .stat-card {
            background: rgba(240, 235, 225, 0.7);
            border: 1px solid #c4b8a4;
            color: #0a0a08;
        }
        .topic-list {
            max-height: 150px;
            overflow-y: auto;
            margin-top: 8px;
        }
        .topic-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid #2a3440;
            font-size: 0.7rem;
        }
        body.light .topic-item {
            border-bottom: 1px solid #d0c4b0;
            color: #0a0a08;
        }
        footer {
            font-size: 0.6rem;
            text-align: center;
            margin-top: 24px;
            color: #5f7f9e;
            opacity: 0.7;
            transition: color 0.3s;
        }
        body.light footer {
            color: #0a0a08;
        }
        button { cursor: pointer; }
        /* Theme toggle button in top bar */
        .theme-toggle-btn {
            background: none;
            border: 1px solid #2a3a4a;
            color: #ffb347;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 500;
        }
        .theme-toggle-btn:hover {
            background: rgba(255, 180, 71, 0.1);
            border-color: #ffb347;
        }
        body.light .theme-toggle-btn {
            border: 1px solid #c4b8a4;
            color: #8a6a3a;
        }
        body.light .theme-toggle-btn:hover {
            background: rgba(180, 150, 110, 0.15);
            border-color: #8a6a3a;
        }
        @media (max-width: 550px) {
            body { padding: 12px; }
            .container { padding: 14px; }
            .q-text { font-size: 1rem; }
            .option-text { font-size: 0.85rem; }
            .action-buttons button { padding: 12px 6px; font-size: 0.8rem; }
            .top-bar { flex-wrap: wrap; justify-content: center; }
            .theme-toggle-btn { font-size: 0.7rem; padding: 4px 10px; }
        }

        /* ===== FIREFOX-SPECIFIC FIX - FULL OVERRIDE ===== */
        @-moz-document url-prefix() {
            /* Background elements */
            body.light {
                background: radial-gradient(circle at 50% 50%, #f5efe6 0%, #f0eadc 25%, #ebe4d2 50%, #e6dfc8 75%, #FFFFE7 100%) !important;
            }
            body.light .container {
                background: #FFFFE7 !important;
                box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5) !important;
            }
            body.light .question-box {
                background: #FFFFE7 !important;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15) !important;
            }
            body.light .top-bar {
                background: #FFFFE7 !important;
            }
            body.light .test-bar {
                background: #FFFFE7 !important;
            }
            body.light .score-panel {
                background: #FFFFE7 !important;
            }
            body.light .review-mode {
                background: #e0d5c5 !important;
            }
            /* Interactive elements */
            body.light .option {
                background: #FFFFE7 !important;
            }
            body.light .option.selected {
                background: #c4a880 !important;
            }
            body.light .score-badge {
                background: #FFFFE7 !important;
                color: #0a0a08 !important;
            }
            body.light .toggle-label {
                background: #FFFFE7 !important;
                color: #0a0a08 !important;
            }
            body.light .clock {
                background: #FFFFE7 !important;
            }
            /* FIX: Dropdown (select) in Firefox */
            body.light select {
                background: #FFFFE7 !important;
                color: #0a0a08 !important;
                border-color: #c4b8a4 !important;
            }
            /* FIX: Download Missed button in Firefox */
            body.light .download-btn {
                background: #d4c4b0 !important;
                color: #0a0a08 !important;
            }
            body.light .action-buttons button {
                background: #c4a880 !important;
                color: #0a0a08 !important;
            }
            body.light .flag-btn {
                background: #a0886a !important;
                color: #0a0a08 !important;
            }
            body.light .restart-btn {
                background: #b0a090 !important;
                color: #0a0a08 !important;
            }
            body.light .theme-toggle-btn {
                background: #FFFFE7 !important;
                border-color: #c4b8a4 !important;
                color: #8a6a3a !important;
            }
            body.light .diff-btn {
                background: #d0c4b0 !important;
                color: #0a0a08 !important;
            }
            body.light .stat-card {
                background: rgba(240, 235, 225, 0.7) !important;
                color: #0a0a08 !important;
            }
            /* Text elements - MAXIMUM CONTRAST */
            body.light .sub {
                color: #0a0a08 !important;
            }
            body.light .q-header {
                color: #3a1a0a !important;
            }
            body.light .q-text {
                color: #0a0a08 !important;
            }
            body.light .option-text {
                color: #0a0a08 !important;
            }
            body.light .score-number {
                color: #0a0a08 !important;
            }
            body.light footer {
                color: #0a0a08 !important;
            }
            body.light .topic-item {
                color: #0a0a08 !important;
            }
            body.light .feedback-correct {
                color: #0a2a0a !important;
            }
            body.light .feedback-wrong {
                color: #3a0a0a !important;
            }
            body.light h1 {
                background: linear-gradient(135deg, #ffb347 0%, #ff8c00 100%) !important;
                -webkit-background-clip: text !important;
                background-clip: text !important;
                color: transparent !important;
            }
        }
    </style>
</head>
<body>
<div class="container" id="appContainer">
    <h1>IL CDL Practice</h1>
    <div class="sub">High Priority in red • Timer off by default • Tap anywhere on answer</div>

    <div class="top-bar">
        <div class="clock" id="clockDisplay" style="display:none;">00:00</div>
        <label class="toggle-label">
            <input type="checkbox" id="timerToggle">
            <span>Show Timer</span>
        </label>
        <div class="score-badge" id="liveScore">✅ 0 | ❌ 0 | 0% | 50 left</div>
        <button class="theme-toggle-btn" id="themeToggleBtn">🌓 Theme</button>
    </div>

    <div class="test-bar">
        <select id="testSelect">
            <option value="general">🚚 General Knowledge (50 Q)</option>
            <option value="air">🛑 Air Brakes (25 Q)</option>
            <option value="combo">🔗 Combination Vehicles (20 Q)</option>
            <option value="pretrip">🔧 Pre-Trip Inspection (20 Q)</option>
        </select>
        <button class="download-btn" id="downloadBtn">📥 Download Missed</button>
    </div>

    <div id="reviewModeBadge" class="review-mode" style="display:none;"></div>

    <div class="question-box">
        <div class="q-header">
            <span id="qCounter">Question 1 / 50</span>
            <span id="bookmarkIcon" style="color:#ffb347; cursor:pointer;">☆</span>
        </div>
        <div class="q-text" id="qText">Loading questions...</div>
        <div class="options" id="optionsContainer"></div>
        <div class="difficulty-row" id="difficultyRow" style="display:none;">
            <button class="diff-btn diff-easy" data-diff="easy">🟢 Easy</button>
            <button class="diff-btn diff-medium" data-diff="medium">🟡 Medium</button>
            <button class="diff-btn diff-hard" data-diff="hard">🔴 Hard</button>
        </div>
        <div class="feedback" id="feedback"></div>
    </div>

    <div class="action-buttons">
        <button id="nextBtn">➡ Next</button>
        <button id="flagBtn" class="flag-btn">⭐ Flag</button>
        <button id="restartBtn" class="restart-btn">🔄 Restart</button>
    </div>

    <div id="scorePanel" class="score-panel" style="display:none;">
        <div>🏆 Test Completed</div>
        <div class="score-number" id="finalScore">0 / 0</div>
        <div id="passMsg"></div>
        <div class="stats-grid" id="statsPanel"></div>
        <div style="display:flex; gap:12px; margin-top:16px; flex-wrap:wrap;">
            <button id="reviewMissedBtn" style="background:#6a4e2a; border:none; padding:10px 16px; border-radius:40px; font-weight:600;">📝 Review Missed</button>
            <button id="reviewFlaggedBtn" style="background:#4a3a2a; border:none; padding:10px 16px; border-radius:40px; font-weight:600;">⭐ Review Flagged</button>
            <button id="newTestBtn" style="background:#3a4c62; border:none; padding:10px 16px; border-radius:40px; font-weight:600;">⟳ New Test</button>
        </div>
    </div>
    <footer>Timer is OFF by default (like the real test). Toggle ON to track your pace.</footer>
</div>

<script>
    // ==============================================================
    // THEME TOGGLE
    // ==============================================================
    const themeToggleBtn = document.getElementById('themeToggleBtn');
    let isDark = true;

    function toggleTheme() {
        isDark = !isDark;

    const comboBank = [
        Q("What is off-tracking?", ["A) Losing GPS", "B) Rear wheels follow different path than front in turns", "C) ABS malfunction", "D) Air leak"], "B", "Rear wheels cut corners more than front wheels during turns.", "Turning", true),
        Q("Which vehicle has highest rearward amplification?", ["A) Straight truck", "B) Tractor-semitrailer", "C) Doubles", "D) Triples"], "D", "Triples have 3.5x rearward amplification, making last trailer most likely to roll over.", "Rollover Risk", true),
        Q("How to steer when backing a trailer?", ["A) Same direction as trailer", "B) Opposite direction", "C) Left only", "D) Right only"], "B", "Turn opposite direction you want the trailer to go.", "Backing", false),
        Q("When should the trailer hand valve be used?", ["A) While driving", "B) Only to test trailer brakes", "C) For parking only", "D) To release springs"], "B", "Using while driving can cause trailer skid.", "Braking", true),
        Q("Purpose of emergency air line?", ["A) Controls service brakes", "B) Supplies air and controls emergency brakes", "C) Powers ABS", "D) Operates landing gear"], "B", "Emergency line supplies air to trailer tanks and controls emergency brakes.", "Air Lines", true),
        Q("Color of emergency air line?", ["A) Blue", "B) Red", "C) Green", "D) Yellow"], "B", "Emergency line is red, service line is blue.", "Air Lines", false),
        Q("Color of service air line?", ["A) Blue", "B) Red", "C) Green", "D) Yellow"], "A", "Service line is blue, emergency line is red.", "Air Lines", false),
        Q("What happens if you cross air lines?", ["A) Brakes work normally", "B) Trailer brakes won't release", "C) ABS deactivates", "D) Only tractor works"], "B", "Supply air goes to service line, spring brakes stay on.", "Air Lines", true),
        Q("How to test trailer emergency brakes?", ["A) Push air supply knob", "B) Pull knob and gently pull forward", "C) Apply foot brake", "D) Listen for leaks"], "B", "Pull trailer air supply and gently pull forward to check if brakes hold.", "Brake Testing", true),
        Q("What is a converter dolly used for?", ["A) Increase brake power", "B) Attach second/third trailer", "C) Convert air to hydraulic", "D) Lift landing gear"], "B", "Converter dolly couples additional trailers for doubles/triples.", "Doubles/Triples", false),
        Q("After coupling, what indicates proper connection?", ["A) No space between tractor and trailer tires", "B) No space between upper and lower fifth wheel", "C) Landing gear on ground", "D) Kingpin visible"], "B", "No gap between upper and lower fifth wheel indicates proper coupling.", "Coupling", true),
        Q("Main cause of trailer jackknife?", ["A) Over acceleration", "B) Trailer wheels locking up", "C) Low tire pressure", "D) Overloading"], "B", "Locked trailer wheels cause the trailer to swing around (jackknife).", "Jackknife Prevention", true),
        Q("Should you use trailer hand brake to fix a jackknife?", ["A) Yes immediately", "B) Never - it caused the skid", "C) Only if ABS fails", "D) In emergency only"], "B", "The hand brake caused the skid. Release brakes to regain traction.", "Jackknife Prevention", true),
        Q("What does the tractor protection valve do?", ["A) Increases pressure", "B) Closes if pressure low (20-45 psi) to stop air leaving tractor", "C) Releases parking brake", "D) Controls ABS"], "B", "Tractor protection valve closes when pressure is low, stopping air from leaving tractor.", "Air Systems", false),
        Q("Fifth wheel position before coupling?", ["A) Up toward cab", "B) Down toward rear of tractor", "C) Level", "D) Any direction"], "B", "Fifth wheel should tilt down toward rear for proper coupling.", "Coupling", false),
        Q("What is rearward amplification?", ["A) Increased braking distance", "B) Rear trailers amplify steering inputs, increasing rollover risk", "C) Improved fuel efficiency", "D) Reduced turning radius"], "B", "Rearward amplification causes the last trailer to be more likely to roll over than the tractor.", "Rollover Risk", true),
        Q("What does red 8-sided trailer air supply knob do when pushed in?", ["A) Applies trailer brakes", "B) Supplies air and releases spring brakes", "C) Activates ABS", "D) Raises landing gear"], "B", "Push in to supply air to trailer and release spring brakes.", "Air Systems", false),
        Q("How to secure a trailer without spring brakes when parked?", ["A) Leave attached", "B) Use wheel chocks", "C) Deflate tires", "D) Lower landing gear fully"], "B", "Trailers without spring brakes need wheel chocks to prevent movement.", "Parking", false),
        Q("Minimum following distance rule for combos over 40 mph?", ["A) 1 sec per 10 ft + 1 sec", "B) 4 seconds", "C) 10 seconds", "D) 2 seconds"], "A", "One second per 10 feet plus one additional second for speeds over 40 mph.", "Following Distance", true),
        Q("Why steer gently when pulling doubles/triples?", ["A) Crack-the-whip effect - rear trailer may roll over", "B) Poor fuel economy", "C) Reduced braking", "D) Increased noise"], "A", "Doubles/triples are more likely to roll over due to crack-the-whip effect.", "Rollover Risk", true)
    ];
    while(comboBank.length < 20) comboBank.push(comboBank[0]);
    if(comboBank.length > 20) comboBank.length = 20;

    const pretripBank = [
        Q("Max steering wheel play on 20-inch wheel?", ["A) 5 degrees", "B) 10 degrees (~2 inches)", "C) 20 degrees", "D) 30 degrees"], "B", "More than 10 degrees makes steering hard.", "Steering", true),
        Q("What to check on tires during pre-trip?", ["A) Inflation", "B) Tread depth", "C) Cuts/bulges", "D) All of the above"], "D", "Check inflation, tread depth, cuts, bulges, valve stems.", "Tires", false),
        Q("What to check in exhaust system?", ["A) Loose pipes", "B) Missing brackets", "C) Leaks", "D) All of the above"], "D", "Leaks can let carbon monoxide into cab.", "Exhaust", false),
        Q("Fire extinguisher requirements?", ["A) Charged", "B) Secured", "C) Rated 10 B:C for placarded", "D) All of the above"], "D", "Must be charged, secured, and properly rated.", "Emergency Equipment", false),
        Q("Three required emergency warning devices?", ["A) 3 red triangles (or 6 fuses/3 flares)", "B) 2 red flags", "C) 1 flare and 2 triangles", "D) Reflective vest"], "A", "Three triangles, six fuses, or three flares required.", "Emergency Equipment", false),
        Q("What to check on brake drums?", ["A) Cracks", "B) Oil/grease on linings", "C) Worn linings", "D) All of the above"], "D", "Check for cracks, contamination, and wear.", "Brakes", false),
        Q("What to check on leaf springs?", ["A) Missing/broken leaves", "B) Cracked hangers", "C) Tight U-bolts", "D) All of the above"], "D", "Check for damage and secure mounting.", "Suspension", false),
        Q("What to check on wheels and rims?", ["A) Cracks/bends", "B) Rust trails", "C) Missing lug nuts", "D) All of the above"], "D", "Check for damage, looseness, missing nuts.", "Wheels", false),
        Q("What to check on coupling system?", ["A) Fifth wheel mount", "B) No gap", "C) Locking jaws", "D) All of the above"], "D", "Inspect all coupling components.", "Coupling", true),
        Q("Landing gear condition for travel?", ["A) Fully raised", "B) Not damaged", "C) Crank secured", "D) All of the above"], "D", "Landing gear must be fully raised and undamaged.", "Landing Gear", false),
        Q("Engine compartment fluid checks?", ["A) Oil level", "B) Coolant level", "C) Belts and hoses", "D) All of the above"], "D", "Check all fluid levels, belts, hoses, and for leaks.", "Engine", false),
        Q("Mirror inspection points?", ["A) Clean and not cracked", "B) Securely mounted", "C) Properly adjusted", "D) All of the above"], "D", "Mirrors must be clean, undamaged, secure, and properly adjusted.", "Mirrors", false),
        Q("Battery inspection items?", ["A) Securely mounted", "B) No corrosion", "C) Proper fluid level", "D) All of the above"], "D", "Check battery mounting, corrosion, and fluid level.", "Electrical", false),
        Q("Glad hand inspection?", ["A) Rubber seals", "B) Proper connection", "C) No air leaks", "D) All of the above"], "D", "Check seals, correct connection, and for leaks.", "Air Lines", false),
        Q("In-cab ABS light behavior?", ["A) Stay on", "B) Come on then turn off (bulb check)", "C) Never come on", "D) Flash red"], "B", "ABS light should do bulb check then turn off. If it stays on, ABS has problem.", "ABS", false),
        Q("Windshield inspection?", ["A) Cracks", "B) Clean", "C) No illegal stickers", "D) All of the above"], "D", "Check for damage, cleanliness, and obstructions.", "Visibility", false),
        Q("Where should ignition key be during pre-trip?", ["A) In your pocket", "B) In ignition", "C) On seat", "D) In glove box"], "A", "Place key in pocket so no one moves the vehicle while you inspect.", "Vehicle Inspection", false),
        Q("Rust around wheel nuts indicates?", ["A) Nuts are loose", "B) Nuts are too tight", "C) Normal", "D) New wheels"], "A", "Rust trails or streaks from lug nuts indicate they may be loose.", "Vehicle Inspection", false),
        Q("Wiper/washer inspection?", ["A) Wipers work", "B) Washers work", "C) Blades not worn", "D) All of the above"], "D", "Wipers and washers must work for visibility in rain/snow.", "Visibility", false),
        Q("Fuel tank inspection?", ["A) Securely mounted", "B) Caps tight", "C) No leaks", "D) All of the above"], "D", "Fuel tanks must be secure, capped, and leak-free.", "Fuel System", false)
    ];
    while(pretripBank.length < 20) pretripBank.push(pretripBank[0]);
    if(pretripBank.length > 20) pretripBank.length = 20;

    const configs = {
        general: { bank: generalBank, count: 50, name: "General Knowledge" },
        air: { bank: airBank, count: 25, name: "Air Brakes" },
        combo: { bank: comboBank, count: 20, name: "Combination Vehicles" },
        pretrip: { bank: pretripBank, count: 20, name: "Pre-Trip Inspection" }
    };

    function shuffleSelect(bank, n) {
        let arr = [...bank];
        for (let i = arr.length - 1; i > 0; i--) {
            let j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr.slice(0, n);
    }

    let questions = [], answers = [], difficulties = [], flagged = new Set();
    let idx = 0, completed = false, reviewMode = false, origQuestions = [], origAnswers = [];
    let timerInterval = null, elapsed = 0, timerOn = false, testType = "general";
    let scoreHistory = [], topicStats = {};

    const testSelect = document.getElementById('testSelect');
    const timerToggle = document.getElementById('timerToggle');
    const clockSpan = document.getElementById('clockDisplay');
    const liveScoreSpan = document.getElementById('liveScore');
    const qCounterSpan = document.getElementById('qCounter');
    const bookmarkSpan = document.getElementById('bookmarkIcon');
    const qTextSpan = document.getElementById('qText');
    const optionsDiv = document.getElementById('optionsContainer');
    const diffRow = document.getElementById('difficultyRow');
    const feedbackDiv = document.getElementById('feedback');
    const nextBtn = document.getElementById('nextBtn');
    const flagBtn = document.getElementById('flagBtn');
    const restartBtn = document.getElementById('restartBtn');
    const scorePanel = document.getElementById('scorePanel');
    const finalScoreSpan = document.getElementById('finalScore');
    const passMsgSpan = document.getElementById('passMsg');
    const statsPanelDiv = document.getElementById('statsPanel');
    const reviewMissedBtn = document.getElementById('reviewMissedBtn');
    const reviewFlaggedBtn = document.getElementById('reviewFlaggedBtn');
    const newTestBtn = document.getElementById('newTestBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const reviewBadge = document.getElementById('reviewModeBadge');

    function formatTime(s) { return `${Math.floor(s/60)}:${(s%60).toString().padStart(2,'0')}`; }
    function updateClock() { if (timerOn && !completed) clockSpan.textContent = formatTime(elapsed); }
    function startTimer() { if (timerInterval) clearInterval(timerInterval); timerInterval = setInterval(() => { if (timerOn && !completed) { elapsed++; updateClock(); } }, 1000); }
    function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
    function resetTimer() { stopTimer(); elapsed = 0; updateClock(); if (timerOn && !completed) startTimer(); }

    function updateScore() {
        if (completed || reviewMode) return;
        let correct = 0, answered = 0;
        for (let i = 0; i <= idx; i++) {
            if (answers[i] !== null) { answered++; if (answers[i] === questions[i].correct) correct++; }
        }
        let pct = answered ? Math.round(correct/answered*100) : 0;
        let remaining = questions.length - answered;
        liveScoreSpan.innerHTML = `✅ ${correct} | ❌ ${answered-correct} | ${pct}% | ${remaining} left`;
    }

    function render() {
        if (completed || idx >= questions.length) { endTest(); return; }
        let q = questions[idx];
        let total = questions.length;
        let cfg = configs[testType];
        let priorityHtml = q.priority ? '<span class="priority">⚠️ High Priority</span>' : '';
        qCounterSpan.innerHTML = `${idx+1}/${total} | ${cfg.name} ${priorityHtml}`;
        bookmarkSpan.innerHTML = flagged.has(idx) ? "⭐ Flagged" : "☆";
        qTextSpan.innerHTML = q.text;
        optionsDiv.innerHTML = '';
        q.options.forEach(opt => {
            let letter = opt[0];
            let div = document.createElement('div');
            div.className = 'option';
            if (answers[idx] === letter) div.classList.add('selected');
            let radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'q';
            radio.value = letter;
            if (answers[idx] === letter) radio.checked = true;
            let span = document.createElement('span');
            span.className = 'option-text';
            span.innerText = opt;
            div.appendChild(radio);
            div.appendChild(span);
            div.onclick = (e) => { if (e.target.tagName !== 'INPUT' && !completed && answers[idx] === null) selectAnswer(letter); };
            optionsDiv.appendChild(div);
        });
        if (answers[idx] !== null) {
            diffRow.style.display = 'flex';
            let diff = difficulties[idx];
            document.querySelectorAll('.diff-btn').forEach(btn => {
                btn.classList.remove('selected');
                if ((diff === 'easy' && btn.dataset.diff === 'easy') ||
                    (diff === 'medium' && btn.dataset.diff === 'medium') ||
                    (diff === 'hard' && btn.dataset.diff === 'hard')) btn.classList.add('selected');
            });
        } else { diffRow.style.display = 'none'; feedbackDiv.style.display = 'none'; }
    }

    function selectAnswer(letter) {
        if (completed) return;
        let q = questions[idx];
        answers[idx] = letter;
        if (!reviewMode) origAnswers[idx] = letter;
        let isCorrect = (letter === q.correct);
        feedbackDiv.style.display = 'block';
        if (isCorrect) {
            feedbackDiv.className = 'feedback feedback-correct';
            feedbackDiv.innerHTML = `✅ CORRECT! ${q.explanation}`;
        } else {
            feedbackDiv.className = 'feedback feedback-wrong';
            let correctLetter = q.correct;
            let correctText = q.options.find(o => o[0] === correctLetter).substring(3);
            feedbackDiv.innerHTML = `❌ WRONG. Correct: ${correctLetter} — ${correctText}<br>📘 ${q.explanation}`;
        }
        diffRow.style.display = 'flex';
        updateScore();
        render();
    }

    function next() {
        if (completed) return;
        if (answers[idx] === null && !reviewMode) { alert("Please answer before continuing."); return; }
        if (idx + 1 < questions.length) { idx++; render(); }
        else endTest();
    }

    function flag() { if (completed) return; if (flagged.has(idx)) flagged.delete(idx); else flagged.add(idx); bookmarkSpan.innerHTML = flagged.has(idx) ? "⭐ Flagged" : "☆"; }

    function loadTest() {
        stopTimer();
        let selected = testSelect.value;
        testType = selected;
        reviewMode = false;
        reviewBadge.style.display = 'none';
        let cfg = configs[selected];
        questions = shuffleSelect(cfg.bank, cfg.count);
        origQuestions = [...questions];
        idx = 0;
        answers = new Array(questions.length).fill(null);
        origAnswers = [...answers];
        difficulties = new Array(questions.length).fill(null);
        flagged.clear();
        completed = false;
        scorePanel.style.display = 'none';
        elapsed = 0;
        updateClock();
        if (timerOn) startTimer();
        updateScore();
        render();
    }

    function endTest() {
        stopTimer();
        completed = true;
        let total = questions.length;
        let score = 0;
        for (let i = 0; i < total; i++) if (answers[i] === questions[i].correct) score++;
        let pct = Math.round(score/total*100);
        if (!reviewMode) {
            scoreHistory.unshift({ date: new Date(), score, total, pct });
            if (scoreHistory.length > 5) scoreHistory.pop();
            topicStats = {};
            for (let i = 0; i < origQuestions.length; i++) {
                let t = origQuestions[i].topic;
                if (!topicStats[t]) topicStats[t] = { total: 0, correct: 0 };
                topicStats[t].total++;
                if (origAnswers[i] === origQuestions[i].correct) topicStats[t].correct++;
            }
        }
        finalScoreSpan.innerText = `${score} / ${total} (${pct}%)`;
        passMsgSpan.innerHTML = pct >= 80 ? '✅ PASSING! Ready for the official exam.' : '❌ Below 80%. Keep practicing!';
        let statsHtml = `<div class="stat-card"><strong>📊 Last 5</strong><br>`;
        scoreHistory.slice(0,5).forEach(s => statsHtml += `${s.score}/${s.total} (${s.pct}%)<br>`);
        statsHtml += `</div><div class="stat-card"><strong>📚 Topics</strong><div class="topic-list">`;
        let sorted = Object.entries(topicStats).sort((a,b) => (a[1].correct/a[1].total) - (b[1].correct/b[1].total));
        sorted.forEach(([t, st]) => {
            let tpct = Math.round(st.correct/st.total*100);
            statsHtml += `<div class="topic-item"><span>${t}</span><span style="color:${tpct>=80?'#2ecc71':tpct>=60?'#d4a017':'#e74c3c'}">${st.correct}/${st.total} (${tpct}%)</span></div>`;
        });
        statsHtml += `</div></div>`;
        statsPanelDiv.innerHTML = statsHtml;
        let missed = total - score;
        if (!reviewMode) {
            reviewMissedBtn.style.display = missed ? 'inline-block' : 'inline-block';
            reviewMissedBtn.innerText = missed ? `📝 Review Missed (${missed})` : '🎉 Perfect Score!';
            reviewFlaggedBtn.style.display = flagged.size ? 'inline-block' : 'none';
            if (flagged.size) reviewFlaggedBtn.innerText = `⭐ Review Flagged (${flagged.size})`;
        }
        scorePanel.style.display = 'block';
        optionsDiv.innerHTML = '<div style="padding:20px;text-align:center;">🏁 Test completed. Choose an option below.</div>';
        qCounterSpan.innerHTML = `Finished | Score: ${score}/${total}`;
        feedbackDiv.style.display = 'none';
        diffRow.style.display = 'none';
        liveScoreSpan.innerHTML = `✅ ${score} | ❌ ${total-score} | ${pct}% | Complete`;
    }

    function restart() { stopTimer(); flagged.clear(); loadTest(); }
    function newTest() { restart(); }

    function reviewMissed() {
        stopTimer();
        let missed = [];
        for (let i = 0; i < origQuestions.length; i++) if (origAnswers[i] !== origQuestions[i].correct) missed.push(origQuestions[i]);
        if (!missed.length) { alert("No missed questions!"); if (timerOn) startTimer(); return; }
        questions = missed;
        idx = 0;
        answers = new Array(questions.length).fill(null);
        difficulties = new Array(questions.length).fill(null);
        flagged.clear();
        completed = false;
        reviewMode = true;
        reviewBadge.style.display = 'inline-block';
        reviewBadge.innerHTML = `📝 REVIEW MODE: ${questions.length} missed questions`;
        scorePanel.style.display = 'none';
        elapsed = 0;
        updateClock();
        if (timerOn) startTimer();
        updateScore();
        render();
    }

    function reviewFlagged() {
        stopTimer();
        if (!flagged.size) { alert("No flagged questions!"); if (timerOn) startTimer(); return; }
        let flaggedList = [];
        for (let i = 0; i < origQuestions.length; i++) if (flagged.has(i)) flaggedList.push(origQuestions[i]);
        questions = flaggedList;
        idx = 0;
        answers = new Array(questions.length).fill(null);
        difficulties = new Array(questions.length).fill(null);
        flagged.clear();
        completed = false;
        reviewMode = true;
        reviewBadge.style.display = 'inline-block';
        reviewBadge.innerHTML = `⭐ REVIEW MODE: ${questions.length} flagged questions`;
        scorePanel.style.display = 'none';
        elapsed = 0;
        updateClock();
        if (timerOn) startTimer();
        updateScore();
        render();
    }

    function downloadMissed() {
        let missed = [];
        for (let i = 0; i < origQuestions.length; i++) {
            if (origAnswers[i] !== origQuestions[i].correct) {
                missed.push({
                    q: origQuestions[i].text,
                    correct: origQuestions[i].options.find(o => o[0] === origQuestions[i].correct).substring(3),
                    explanation: origQuestions[i].explanation,
                    topic: origQuestions[i].topic,
                    priority: origQuestions[i].priority
                });
            }
        }
        if (!missed.length) { alert("No missed questions!"); return; }
        let content = `IL CDL Missed Questions - ${new Date().toLocaleString()}\n${'='.repeat(50)}\n\n`;
        missed.forEach((m, i) => {
            content += `Q${i+1} [${m.topic}]${m.priority ? ' ⚠️ HIGH PRIORITY' : ''}\n`;
            content += `Question: ${m.q}\n`;
            content += `Correct Answer: ${m.correct}\n`;
            content += `Explanation: ${m.explanation}\n${'-'.repeat(40)}\n\n`;
        });
        let blob = new Blob([content], { type: 'text/plain' });
        let a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `cdl_missed_${Date.now()}.txt`;
        a.click();
        URL.revokeObjectURL(a.href);
    }

    document.querySelectorAll('.diff-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            if (completed) return;
            let diff = btn.dataset.diff;
            difficulties[idx] = diff;
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        });
    });

    timerToggle.addEventListener('change', (e) => {
        timerOn = e.target.checked;
        clockSpan.style.display = timerOn ? 'inline-block' : 'none';
        if (timerOn && !completed) { resetTimer(); startTimer(); }
        else if (!timerOn) stopTimer();
    });
    clockSpan.style.display = 'none';

    testSelect.addEventListener('change', restart);
    nextBtn.addEventListener('click', next);
    flagBtn.addEventListener('click', flag);
    restartBtn.addEventListener('click', restart);
    newTestBtn.addEventListener('click', newTest);
    reviewMissedBtn.addEventListener('click', reviewMissed);
    reviewFlaggedBtn.addEventListener('click', reviewFlagged);
    downloadBtn.addEventListener('click', downloadMissed);
    loadTest();
</script>
</body>
</html>
